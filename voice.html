<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>まちの困りごと｜岩下りゅう 活動報告</title>

<meta name="description" content="道路の穴、街灯切れ、不法投棄、危険箇所など、地域で気づいた困りごとを写真付きで投稿できます。">
<meta name="theme-color" content="#237a3b">

<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>

:root{
 --kappa-dark:#14532d;
 --kappa-main:#237a3b;
 --kappa-mid:#4caf63;
 --shinryoku:#e8f8e8;
 --river-blue:#e0f2fe;
 --cream:#fff7c2;
 --gold:#facc15;
 --ink:#1f2933;
 --muted:#4b6350;
 --line:#9ed7aa;
 --white:#ffffff;
}

*{
 box-sizing:border-box;
}

html{
 scroll-behavior:smooth;
}

body{
 margin:0;
 font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
 background:
 radial-gradient(circle at 8% 0%,rgba(190,240,185,.70),transparent 28%),
 radial-gradient(circle at 92% 4%,rgba(224,242,254,.78),transparent 30%),
 linear-gradient(180deg,#f7fff4 0%,#ffffff 50%,#eef9ee 100%);
 color:var(--ink);
 line-height:1.7;
 -webkit-text-size-adjust:100%;
}

a{
 color:inherit;
 text-decoration:none;
}

button{
 font-family:inherit;
 cursor:pointer;
}

.wrap{
 width:min(980px,94%);
 margin:auto;
 padding:12px 0 96px;
}

.header{
 position:sticky;
 top:0;
 z-index:80;
 display:flex;
 align-items:center;
 justify-content:space-between;
 gap:12px;
 padding:10px 0;
 background:rgba(247,255,244,.96);
 backdrop-filter:blur(16px);
}

.brand{
 display:flex;
 align-items:center;
 gap:10px;
 color:var(--kappa-dark);
 font-weight:900;
}

.brand img{
 width:44px;
 height:44px;
 border-radius:16px;
 object-fit:cover;
 box-shadow:0 8px 22px rgba(20,83,45,.18);
}

.brand span{
 font-size:18px;
 line-height:1.25;
}

.headerNav{
 display:flex;
 flex-wrap:wrap;
 gap:7px;
}

.headerNav a{
 padding:9px 13px;
 border-radius:999px;
 background:#fff;
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:13px;
 font-weight:900;
 box-shadow:0 6px 16px rgba(20,83,45,.07);
}

.hero{
 margin-top:8px;
 border-radius:34px;
 background:
 radial-gradient(circle at 100% 0%,rgba(255,247,194,.70),transparent 34%),
 radial-gradient(circle at 0% 100%,rgba(224,242,254,.60),transparent 34%),
 linear-gradient(135deg,#ffffff 0%,#f3fff1 100%);
 border:2px solid var(--line);
 box-shadow:0 16px 40px rgba(20,83,45,.12);
 padding:24px;
}

.kicker{
 display:inline-flex;
 padding:8px 13px;
 border-radius:999px;
 background:var(--shinryoku);
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:14px;
 font-weight:900;
}

.hero h1{
 margin:14px 0 0;
 color:var(--kappa-dark);
 font-size:clamp(38px,10vw,66px);
 line-height:1.08;
 font-weight:900;
}

.hero h1 span{
 display:block;
 color:var(--kappa-main);
}

.hero p{
 margin:12px 0 0;
 color:var(--ink);
 font-size:18px;
 line-height:1.75;
 font-weight:850;
}

.mainActions{
 margin-top:18px;
 display:grid;
 grid-template-columns:1.3fr 1fr;
 gap:12px;
}

.mainActions a{
 min-height:78px;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 border-radius:26px;
 font-size:22px;
 font-weight:900;
 padding:12px;
}

.mainActions a.primary{
 background:linear-gradient(135deg,#14532d 0%,#237a3b 55%,#4caf63 100%);
 color:#fff;
 border:2px solid var(--kappa-main);
 box-shadow:0 14px 30px rgba(20,83,45,.26);
}

.mainActions a.secondary{
 background:#fff;
 color:var(--kappa-dark);
 border:2px solid var(--line);
}

.infoGrid{
 margin-top:18px;
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:12px;
}

.infoCard{
 background:#fff;
 border:2px solid var(--line);
 border-radius:26px;
 padding:18px;
 box-shadow:0 12px 30px rgba(20,83,45,.08);
}

.infoCard:nth-child(1){
 background:linear-gradient(135deg,#ffffff 0%,#f0fff1 100%);
}

.infoCard:nth-child(2){
 background:linear-gradient(135deg,#ffffff 0%,#eaf7ff 100%);
}

.infoCard:nth-child(3){
 background:linear-gradient(135deg,#ffffff 0%,#fffbe0 100%);
}

.infoCard h2{
 margin:0;
 color:var(--kappa-dark);
 font-size:24px;
 line-height:1.25;
 font-weight:900;
}

.infoCard p{
 margin:8px 0 0;
 color:var(--ink);
 font-size:16px;
 font-weight:850;
}

.notice{
 margin-top:16px;
 border-radius:24px;
 background:var(--cream);
 border:2px solid var(--gold);
 color:#5c3b00;
 padding:16px;
 font-size:16px;
 line-height:1.7;
 font-weight:900;
}

.reports{
 margin-top:28px;
}

.reportsHead{
 display:flex;
 align-items:flex-end;
 justify-content:space-between;
 gap:12px;
 margin-bottom:14px;
}

.reportsHead h2{
 margin:0;
 color:var(--kappa-dark);
 font-size:clamp(34px,8vw,54px);
 line-height:1.15;
 font-weight:900;
}

.reloadBtn{
 border-radius:999px;
 background:#fff;
 border:2px solid var(--line);
 color:var(--kappa-dark);
 font-size:15px;
 font-weight:900;
 padding:10px 14px;
}

.reportList{
 display:grid;
 grid-template-columns:1fr;
 gap:18px;
}

.reportCard{
 overflow:hidden;
 border-radius:32px;
 background:#fff;
 border:2px solid var(--line);
 box-shadow:0 16px 40px rgba(20,83,45,.11);
}

.reportImageBox{
 width:100%;
 aspect-ratio:4/3;
 background:
 radial-gradient(circle at 100% 0%,rgba(224,242,254,.70),transparent 35%),
 linear-gradient(135deg,#f5fff3 0%,#e8f8e8 100%);
 display:flex;
 align-items:center;
 justify-content:center;
 overflow:hidden;
 border-bottom:1px solid #d6f3d8;
}

.reportImageBox img{
 display:block;
 width:100%;
 height:100%;
 object-fit:contain;
 background:#fff;
}

.noImage{
 color:var(--muted);
 font-size:20px;
 font-weight:900;
}

.reportBody{
 padding:18px;
}

.reportMeta{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 margin-bottom:12px;
}

.badge{
 display:inline-flex;
 align-items:center;
 padding:6px 11px;
 border-radius:999px;
 background:var(--shinryoku);
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:13px;
 font-weight:900;
}

.badge.status{
 background:var(--cream);
 border-color:var(--gold);
 color:#5c3b00;
}

.badge.good{
 background:#dcfce7;
 border-color:#86efac;
 color:#166534;
}

.badge.warn{
 background:#fee2e2;
 border-color:#fca5a5;
 color:#7f1d1d;
}

.reportTitle{
 margin:0;
 color:var(--kappa-dark);
 font-size:clamp(28px,7vw,44px);
 line-height:1.2;
 font-weight:900;
}

.labelBlock{
 margin-top:12px;
 border-radius:20px;
 background:#f8fff6;
 border:1px solid #c7eecb;
 padding:13px;
}

.labelTitle{
 color:var(--kappa-dark);
 font-size:14px;
 font-weight:900;
}

.labelText{
 margin-top:4px;
 color:var(--ink);
 font-size:18px;
 line-height:1.65;
 font-weight:850;
 white-space:pre-wrap;
 word-break:break-word;
}

.improvementBox{
 margin-top:14px;
 border-radius:22px;
 background:#ecfdf5;
 border:2px solid #86efac;
 padding:14px;
 color:#166534;
}

.improvementTitle{
 font-size:16px;
 font-weight:900;
}

.improvementText{
 margin-top:6px;
 font-size:17px;
 line-height:1.7;
 font-weight:850;
 white-space:pre-wrap;
}

.improvementPhoto{
 margin-top:12px;
 width:100%;
 max-height:320px;
 object-fit:contain;
 border-radius:18px;
 background:#fff;
 border:1px solid #bbf7d0;
}

.reportButtons{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 margin-top:16px;
}

.reportButtons a,
.reportButtons button{
 min-height:56px;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 border-radius:20px;
 background:#fff;
 border:2px solid var(--line);
 color:var(--kappa-dark);
 font-size:16px;
 font-weight:900;
}

.reportButtons a.navi{
 background:linear-gradient(135deg,#14532d 0%,#237a3b 55%,#4caf63 100%);
 border-color:var(--kappa-main);
 color:#fff;
}

.reportButtons button[disabled]{
 opacity:.45;
}

.shareBox{
 margin-top:14px;
 border-radius:24px;
 background:#f7fff5;
 border:1px solid #c8f0ce;
 padding:14px;
}

.shareTitle{
 color:var(--kappa-dark);
 font-size:16px;
 font-weight:900;
 margin-bottom:10px;
}

.shareButtons{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
}

.shareButtons a,
.shareButtons button{
 min-height:50px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:18px;
 border:2px solid var(--line);
 background:#fff;
 color:var(--kappa-dark);
 font-size:15px;
 font-weight:900;
}

.empty{
 border-radius:28px;
 background:#fff;
 border:2px solid var(--line);
 box-shadow:0 12px 30px rgba(20,83,45,.10);
 padding:22px;
 color:var(--muted);
}

.empty h3{
 margin:0;
 color:var(--kappa-dark);
 font-size:26px;
 line-height:1.3;
 font-weight:900;
}

.empty p{
 margin:10px 0 0;
 color:var(--ink);
 font-size:18px;
 line-height:1.7;
 font-weight:850;
}

.footer{
 margin-top:30px;
 text-align:center;
 color:var(--ink);
 font-size:13px;
 font-weight:800;
}

.bottomNav{
 position:fixed;
 left:0;
 right:0;
 bottom:0;
 z-index:100;
 display:grid;
 grid-template-columns:repeat(5,1fr);
 background:rgba(255,255,255,.98);
 border-top:1px solid var(--line);
 box-shadow:0 -12px 30px rgba(20,83,45,.12);
 backdrop-filter:blur(14px);
}

.bottomNav a{
 text-align:center;
 color:var(--kappa-dark);
 padding:8px 4px 7px;
 font-size:12px;
 font-weight:900;
}

.bottomNav a span{
 display:block;
 font-size:22px;
 line-height:1.1;
}

.bottomNav a.active{
 background:#e2f8e5;
 color:#14532d;
}

@media (min-width:820px){

 .reportList{
  grid-template-columns:repeat(2,1fr);
 }

 .reportCard:first-child{
  grid-column:1 / -1;
 }

 .reportCard:first-child .reportImageBox{
  aspect-ratio:21/9;
 }

}

@media (max-width:700px){

 .headerNav{
  display:none;
 }

 .brand span{
  font-size:16px;
 }

 .hero{
  border-radius:28px;
  padding:18px;
 }

 .mainActions,
 .infoGrid,
 .reportButtons{
  grid-template-columns:1fr;
 }

 .reportsHead{
  align-items:flex-start;
  flex-direction:column;
 }

 .shareButtons{
  grid-template-columns:1fr 1fr;
 }

}

</style>
</head>

<body>

<div class="wrap">

<header class="header">

 <a class="brand" href="index.html">
  <img src="apple-touch-icon.png" alt="岩下
