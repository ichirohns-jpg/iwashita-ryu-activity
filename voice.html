*{

}

html{
  scroll-behavior:smooth;

body{

    "Yu Gothic",
    "Meiryo",

.header{

.brand{

.brand img{

  font-size:13px;
  font-weight:900;
  box-shadow:0 6px 16px rgba(70,130,82,.07);
}

.hero{
  margin-top:8px;
  border-radius:34px;
  background:

  border:2px solid #b7ebc0;
  box-shadow:0 16px 40px rgba(70,130,82,.12);
  padding:24px;
}

.kicker{

  border:1px solid #b7ebc0;
  color:#1f6b3d;
  font-size:14px;
  font-weight:900;
}

.hero h1{
  margin:14px 0 0;
  color:#1f5f35;
  font-size:clamp(36px,9vw,62px);
  line-height:1.08;
  font-weight:900;
}

.hero h1 span{
  display:block;
  color:#4caf63;
}

.hero p{
  margin:12px 0 0;
  color:#344c39;
  font-size:18px;
  line-height:1.75;
  font-weight:850;
}

.flow{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  margin-top:18px;
}

.flowCard{
  border-radius:30px;
  background:#fff;
  border:2px solid #b7ebc0;
  box-shadow:0 14px 34px rgba(70,130,82,.10);
  padding:18px;
}

.flowHead{
  display:flex;
  align-items:center;
  gap:12px;
}

.num{
  width:52px;
  height:52px;
  border-radius:18px;
  background:linear-gradient(135deg,#4caf63 0%,#78c96f 100%);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  flex:none;
}

.flowCard h2{
  margin:0;
  color:#1f5f35;
  font-size:clamp(26px,7vw,42px);
  line-height:1.2;
  font-weight:900;
}

.flowCard p{
  margin:12px 0 0;
  color:#3c5943;
  font-size:17px;
  line-height:1.7;
  font-weight:850;
}
