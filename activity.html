<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>活動報告｜岩下りゅう 活動報告</title>

<meta name="description" content="岩下りゅうの地域活動、商店会、文化・歴史、まちづくりの活動報告を写真と文章で掲載します。">
<meta name="theme-color" content="#237a3b">

<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>

:root{
 --kappa-dark:#14532d;
 --kappa-main:#237a3b;
 --kappa-mid:#4caf63;
 --kappa-light:#7bcf7a;
 --shinryoku:#e8f8e8;
 --shinryoku-soft:#f7fff4;
 --river-blue:#e0f2fe;
 --cream:#fff7c2;
 --gold:#facc15;
 --ink:#1f2933;
 --muted:#4b6350;
 --line:#9ed7aa;
 --white:#ffffff;
}

*{
 box-sizing:border-box;
}

html{
 scroll-behavior:smooth;
}

body{
 margin:0;
 font-family:
 "Hiragino Sans",
 "Yu Gothic",
 "Meiryo",
 sans-serif;
 background:
 radial-gradient(circle at 8% 0%,rgba(190,240,185,.70),transparent 28%),
 radial-gradient(circle at 92% 4%,rgba(224,242,254,.78),transparent 30%),
 linear-gradient(180deg,#f7fff4 0%,#ffffff 50%,#eef9ee 100%);
 color:var(--ink);
 line-height:1.7;
 -webkit-text-size-adjust:100%;
}

a{
 color:inherit;
 text-decoration:none;
}

button{
 font-family:inherit;
 cursor:pointer;
}

.wrap{
 width:min(980px,94%);
 margin:auto;
 padding:12px 0 96px;
}

.header{
 position:sticky;
 top:0;
 z-index:80;
 display:flex;
 align-items:center;
 justify-content:space-between;
 gap:12px;
 padding:10px 0;
 background:rgba(247,255,244,.96);
 backdrop-filter:blur(14px);
}

.brand{
 display:flex;
 align-items:center;
 gap:10px;
 color:var(--kappa-dark);
 font-weight:900;
}

.brand img{
 width:44px;
 height:44px;
 border-radius:14px;
 object-fit:cover;
 box-shadow:0 6px 18px rgba(20,83,45,.18);
}

.brand span{
 font-size:18px;
 line-height:1.25;
}

.headerNav{
 display:flex;
 flex-wrap:wrap;
 gap:7px;
}

.headerNav a{
 padding:9px 13px;
 border-radius:999px;
 background:#fff;
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:13px;
 font-weight:900;
 box-shadow:0 6px 16px rgba(20,83,45,.07);
}

.hero{
 margin-top:8px;
 border-radius:28px;
 background:
 radial-gradient(circle at 100% 0%,rgba(255,247,194,.70),transparent 34%),
 radial-gradient(circle at 0% 100%,rgba(224,242,254,.60),transparent 34%),
 linear-gradient(135deg,#ffffff 0%,#f3fff1 100%);
 border:2px solid var(--line);
 box-shadow:0 12px 30px rgba(20,83,45,.10);
 padding:22px;
}

.kicker{
 display:inline-flex;
 padding:7px 12px;
 border-radius:999px;
 background:var(--shinryoku);
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:14px;
 font-weight:900;
}

.hero h1{
 margin:12px 0 0;
 color:var(--kappa-dark);
 font-size:clamp(34px,8vw,56px);
 line-height:1.12;
 font-weight:900;
}

.hero p{
 margin:10px 0 0;
 color:var(--ink);
 font-size:18px;
 line-height:1.75;
 font-weight:850;
}

.heroButtons{
 margin-top:16px;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.heroButtons a{
 min-height:58px;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 border-radius:22px;
 background:#fff;
 border:2px solid var(--line);
 color:var(--kappa-dark);
 font-size:18px;
 font-weight:900;
 padding:10px;
}

.heroButtons a.primary{
 background:linear-gradient(135deg,#14532d 0%,#237a3b 55%,#4caf63 100%);
 border-color:var(--kappa-main);
 color:#fff;
 box-shadow:0 12px 26px rgba(20,83,45,.22);
}

.listSection{
 margin-top:28px;
}

.listHead{
 display:flex;
 align-items:flex-end;
 justify-content:space-between;
 gap:12px;
 margin-bottom:14px;
}

.listHead h2{
 margin:0;
 color:var(--kappa-dark);
 font-size:clamp(30px,7vw,46px);
 line-height:1.18;
 font-weight:900;
}

.listHead p{
 margin:5px 0 0;
 color:var(--ink);
 font-size:16px;
 font-weight:850;
}

.reloadBtn{
 border-radius:999px;
 background:#fff;
 border:2px solid var(--line);
 color:var(--kappa-dark);
 font-size:15px;
 font-weight:900;
 padding:10px 14px;
}

.activityList{
 display:grid;
 grid-template-columns:1fr;
 gap:18px;
}

.activityCard{
 overflow:hidden;
 border-radius:28px;
 background:#fff;
 border:2px solid var(--line);
 box-shadow:0 12px 30px rgba(20,83,45,.10);
}

.activityImageBox{
 width:100%;
 aspect-ratio:4/3;
 background:
 radial-gradient(circle at 100% 0%,rgba(224,242,254,.70),transparent 35%),
 linear-gradient(135deg,#f5fff3 0%,#e8f8e8 100%);
 border-bottom:1px solid #d6f3d8;
 display:flex;
 align-items:center;
 justify-content:center;
 overflow:hidden;
}

.activityImageBox img{
 width:100%;
 height:100%;
 object-fit:cover;
 display:block;
}

.noImage{
 color:var(--muted);
 font-size:18px;
 font-weight:900;
}

.activityBody{
 padding:18px;
}

.metaRow{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 margin-bottom:12px;
}

.badge{
 display:inline-flex;
 align-items:center;
 padding:6px 11px;
 border-radius:999px;
 background:var(--shinryoku);
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:13px;
 font-weight:900;
}

.activityTitle{
 margin:0;
 color:var(--kappa-dark);
 font-size:clamp(26px,6vw,40px);
 line-height:1.25;
 font-weight:900;
}

.activitySummary{
 margin-top:12px;
 color:var(--ink);
 font-size:18px;
 line-height:1.75;
 font-weight:850;
 white-space:pre-wrap;
 word-break:break-word;
}

.photoGrid{
 margin-top:14px;
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
}

.photoGrid img{
 display:block;
 width:100%;
 aspect-ratio:1/1;
 object-fit:cover;
 border-radius:16px;
 border:1px solid #c8f0ce;
 background:#f7fff5;
}

.shareBox{
 margin-top:16px;
 border-radius:22px;
 background:#f7fff5;
 border:1px solid #c8f0ce;
 padding:14px;
}

.shareTitle{
 color:var(--kappa-dark);
 font-size:16px;
 font-weight:900;
 margin-bottom:10px;
}

.shareButtons{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
}

.shareButtons a,
.shareButtons button{
 min-height:48px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:17px;
 border:2px solid var(--line);
 background:#fff;
 color:var(--kappa-dark);
 font-size:15px;
 font-weight:900;
}

.nextAction{
 margin-top:22px;
 border-radius:28px;
 background:#fff;
 border:2px solid var(--line);
 box-shadow:0 12px 30px rgba(20,83,45,.10);
 padding:20px;
}

.nextAction h2{
 margin:0;
 color:var(--kappa-dark);
 font-size:28px;
 line-height:1.25;
 font-weight:900;
}

.nextAction p{
 margin:8px 0 0;
 color:var(--ink);
 font-size:16px;
 font-weight:850;
}

.nextButtons{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-top:14px;
}

.nextButtons a{
 min-height:60px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:22px;
 background:#fff;
 border:2px solid var(--line);
 color:var(--kappa-dark);
 font-size:18px;
 font-weight:900;
}

.nextButtons a.support{
 background:var(--cream);
 border-color:var(--gold);
 color:#5c3b00;
}

.empty{
 border-radius:26px;
 background:#fff;
 border:2px solid var(--line);
 box-shadow:0 10px 26px rgba(20,83,45,.10);
 padding:22px;
 color:var(--muted);
}

.empty h3{
 margin:0;
 color:var(--kappa-dark);
 font-size:25px;
 line-height:1.3;
 font-weight:900;
}

.empty p{
 margin:10px 0 0;
 color:var(--ink);
 font-size:17px;
 line-height:1.7;
 font-weight:850;
}

.footer{
 margin-top:30px;
 text-align:center;
 color:var(--ink);
 font-size:13px;
 font-weight:800;
}

.bottomNav{
 position:fixed;
 left:0;
 right:0;
 bottom:0;
 z-index:100;
 display:grid;
 grid-template-columns:repeat(5,1fr);
 background:rgba(255,255,255,.98);
 border-top:1px solid var(--line);
 box-shadow:0 -12px 30px rgba(20,83,45,.12);
 backdrop-filter:blur(14px);
}

.bottomNav a{
 text-align:center;
 color:var(--kappa-dark);
 padding:8px 4px 7px;
 font-size:12px;
 font-weight:900;
}

.bottomNav a span{
 display:block;
 font-size:22px;
 line-height:1.1;
}

.bottomNav a.active{
 background:#e2f8e5;
 color:#14532d;
}

@media (min-width:820px){

 .activityList{
  grid-template-columns:repeat(2,1fr);
 }

 .activityCard:first-child{
  grid-column:1 / -1;
 }

 .activityCard:first-child .activityImageBox{
  aspect-ratio:21/9;
 }

}

@media (max-width:700px){

 .wrap{
  width:94%;
 }

 .headerNav{
  display:none;
 }

 .brand span{
  font-size:16px;
 }

 .hero{
  border-radius:26px;
  padding:18px;
 }

 .heroButtons{
  grid-template-columns:1fr;
 }

 .listHead{
  align-items:flex-start;
  flex-direction:column;
 }

 .activityBody{
  padding:17px;
 }

 .shareButtons{
  grid-template-columns:1fr 1fr;
 }

 .nextButtons{
  grid-template-columns:1fr;
 }

}

</style>
</head>

<body>

<div class="wrap">

<header class="header">

 <a class="brand" href="index.html">
  <img src="apple-touch-icon.png" alt="岩下りゅう">
  <span>岩下りゅう 活動報告</span>
 </a>

 <nav class="headerNav">
  <a href="index.html">トップ</a>
  <a href="activity.html">活動</a>
  <a href="videos.html">動画</a>
  <a href="support.html">応援</a>
  <a href="profile.html">人物</a>
 </nav>

</header>

<main>

<section class="hero">

 <div class="kicker">写真で見る活動</div>

 <h1>活動報告</h1>

 <p>
  地域活動、商店会、文化・歴史、まちづくりの活動を、写真と文章でわかりやすく掲載します。
 </p>

 <div class="heroButtons">
  <a class="primary" href="#activityList">最新の活動を見る</a>
  <a href="support.html">応援メッセージを書く</a>
 </div>

</section>

<section class="listSection">

 <div class="listHead">

  <div>
   <h2>最新の活動</h2>
   <p>公開中の活動報告を表示します。</p>
  </div>

  <button class="reloadBtn" type="button" onclick="loadActivities()">更新</button>

 </div>

 <div id="activityList" class="activityList">

  <div class="empty">
   <h3>活動報告を読み込み中です。</h3>
   <p>少しお待ちください。</p>
  </div>

 </div>

</section>

<section class="nextAction">

 <h2>活動を見たあとは</h2>

 <p>
  応援メッセージやプロフィールもご覧いただけます。
 </p>

 <div class="nextButtons">
  <a class="support" href="support.html">応援メッセージを書く</a>
  <a href="profile.html">岩下りゅうとは</a>
 </div>

</section>

</main>

<footer class="footer">
 岩下りゅう 活動報告<br>
 地域での活動を、写真と動画でわかりやすく。
</footer>

</div>

<nav class="bottomNav">
 <a href="index.html"><span>🏠</span>トップ</a>
 <a href="activity.html" class="active"><span>📸</span>活動</a>
 <a href="videos.html"><span>🎥</span>動画</a>
 <a href="support.html"><span>💬</span>応援</a>
 <a href="profile.html"><span>👤</span>人物</a>
</nav>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxaTX14m9ftBS_Udl8w-HCHXSulvFcV9VJ9ANGM6FwCx0ejCLXaY0MhdbdexXBHkSmxJg/exec";

const activityList =
document.getElementById("activityList");

function esc(v){

 return String(v || "")
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;")
 .replace(/'/g,"&#39;");

}

function pick(obj,keys,defaultValue){

 for(let i = 0; i < keys.length; i++){

  const key =
  keys[i];

  if(
   obj &&
   obj[key] !== undefined &&
   obj[key] !== null &&
   String(obj[key]).trim() !== ""
  ){

   return String(obj[key]).trim();

  }

 }

 return defaultValue || "";

}

function normalizeActivities(data){

 if(Array.isArray(data)){
  return data;
 }

 if(data && Array.isArray(data.records)){
  return data.records;
 }

 if(data && Array.isArray(data.activities)){
  return data.activities;
 }

 if(data && Array.isArray(data.data)){
  return data.data;
 }

 if(data && Array.isArray(data.items)){
  return data.items;
 }

 return [];

}

function shortDate(v){

 const s =
 String(v || "");

 if(!s){
  return "";
 }

 return s
 .replace(/\s\d{2}:\d{2}.*/,"")
 .replace(/-/g,"/");

}

function getImages(r){

 const imgs = [];

 [
  "画像URL1",
  "画像URL2",
  "画像URL3",
  "画像URL4",
  "画像URL5",
  "imageUrl1",
  "imageUrl2",
  "imageUrl3",
  "imageUrl4",
  "imageUrl5"
 ].forEach(function(key){

  const url =
  pick(r,[key],"");

  if(url && imgs.indexOf(url) === -1){
   imgs.push(url);
  }

 });

 return imgs;

}

function activityShareUrl(id){

 const base =
 location.origin +
 location.pathname;

 if(id){
  return base + "#activity-" + encodeURIComponent(id);
 }

 return base;

}

function makeShareText(title,summary){

 return (
  String(title || "岩下りゅう 活動報告") +
  "\n" +
  String(summary || "")
 ).trim();

}

function copyActivity(title,url){

 const text =
 title + "\n" + url;

 if(navigator.clipboard){

  navigator.clipboard.writeText(text)
  .then(function(){
   alert("リンクをコピーしました。");
  })
  .catch(function(){
   alert("コピーできませんでした。");
  });

  return;

 }

 alert(url);

}

function activityCard(r,index){

 const id =
 pick(r,[
  "ID",
  "id",
  "activityId"
 ],String(index + 1));

 const date =
 shortDate(
  pick(r,[
   "日付",
   "日時",
   "date",
   "createdAt"
  ],"")
 );

 const theme =
 pick(r,[
  "テーマ",
  "theme",
  "分類",
  "category"
 ],"");

 const title =
 pick(r,[
  "タイトル",
  "title"
 ],"活動報告");

 const summary =
 pick(r,[
  "概要",
  "summary",
  "本文",
  "body",
  "description"
 ],"");

 const snsText =
 pick(r,[
  "SNS投稿文",
  "snsText"
 ],"");

 const images =
 getImages(r);

 const mainImage =
 images[0] || "";

 const shareUrl =
 activityShareUrl(id);

 const shareText =
 makeShareText(
  title,
  snsText || summary
 );

 const lineUrl =
 "https://social-plugins.line.me/lineit/share?url=" +
 encodeURIComponent(shareUrl);

 const xUrl =
 "https://twitter.com/intent/tweet?text=" +
 encodeURIComponent(shareText) +
 "&url=" +
 encodeURIComponent(shareUrl);

 const fbUrl =
 "https://www.facebook.com/sharer/sharer.php?u=" +
 encodeURIComponent(shareUrl);

 const extraImages =
 images
 .slice(1)
 .map(function(url){
  return '<img src="' + esc(url) + '" alt="' + esc(title) + '">';
 })
 .join("");

 return ''
 + '<article class="activityCard" id="activity-' + esc(id) + '">'

 + '<div class="activityImageBox">'
 + (mainImage
    ? '<img src="' + esc(mainImage) + '" alt="' + esc(title) + '">'
    : '<div class="noImage">写真なし</div>'
   )
 + '</div>'

 + '<div class="activityBody">'

 + '<div class="metaRow">'
 + (date ? '<span class="badge">📅 ' + esc(date) + '</span>' : '')
 + (theme ? '<span class="badge">🏷️ ' + esc(theme) + '</span>' : '')
 + '</div>'

 + '<h2 class="activityTitle">' + esc(title) + '</h2>'

 + (summary ? '<div class="activitySummary">' + esc(summary) + '</div>' : '')

 + (extraImages ? '<div class="photoGrid">' + extraImages + '</div>' : '')

 + '<div class="shareBox">'
 + '<div class="shareTitle">この活動を共有する</div>'
 + '<div class="shareButtons">'
 + '<a href="' + esc(lineUrl) + '" target="_blank" rel="noopener">LINE</a>'
 + '<a href="' + esc(xUrl) + '" target="_blank" rel="noopener">X</a>'
 + '<a href="' + esc(fbUrl) + '" target="_blank" rel="noopener">Facebook</a>'
 + '<button type="button" onclick="copyActivity(' + JSON.stringify(title) + ',' + JSON.stringify(shareUrl) + ')">コピー</button>'
 + '</div>'
 + '</div>'

 + '</div>'

 + '</article>';

}

function renderActivities(data){

 const records =
 normalizeActivities(data);

 if(!records.length){

  activityList.innerHTML =
  '<div class="empty">' +
  '<h3>現在、公開中の活動報告は準備中です。</h3>' +
  '<p>公開された活動報告は、このページに順番に表示されます。</p>' +
  '</div>';

  return;

 }

 activityList.innerHTML =
 records
 .map(function(r,index){
  return activityCard(r,index);
 })
 .join("");

}

function loadActivities(){

 activityList.innerHTML =
 '<div class="empty">' +
 '<h3>活動報告を読み込み中です。</h3>' +
 '<p>少しお待ちください。</p>' +
 '</div>';

 const callbackName =
 "activitiesCallback_" +
 Date.now() +
 "_" +
 Math.floor(Math.random() * 100000);

 window[callbackName] =
 function(data){

  renderActivities(data);

  try{
   delete window[callbackName];
  }catch(e){
   window[callbackName] = undefined;
  }

  const old =
  document.getElementById(callbackName);

  if(old){
   old.remove();
  }

 };

 const script =
 document.createElement("script");

 script.id =
 callbackName;

 script.src =
 GAS_URL +
 "?mode=getActivities&callback=" +
 encodeURIComponent(callbackName) +
 "&t=" +
 Date.now();

 script.onerror =
 function(){

  activityList.innerHTML =
  '<div class="empty">' +
  '<h3>活動報告を読み込めませんでした。</h3>' +
  '<p>GAS URL、デプロイ、アクセス権限を確認してください。</p>' +
  '</div>';

  try{
   delete window[callbackName];
  }catch(e){
   window[callbackName] = undefined;
  }

 };

 document.body.appendChild(script);

}

loadActivities();

</script>

</body>
</html>
