<style>
*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:
    "Hiragino Sans",
    "Yu Gothic",
    "Meiryo",
    sans-serif;
  color:#173424;
  background:
    radial-gradient(circle at 10% 0%,rgba(191,255,204,.72),transparent 26%),
    radial-gradient(circle at 90% 4%,rgba(255,239,151,.42),transparent 24%),
    linear-gradient(180deg,#f2fff5 0%,#ffffff 45%,#e7f8ec 100%);
  line-height:1.75;
  -webkit-text-size-adjust:100%;
}

a{
  color:inherit;
  text-decoration:none;
}

button{
  font-family:inherit;
}

img{
  max-width:100%;
}

.wrap{
  width:min(1120px,94%);
  margin:auto;
  padding:12px 0 94px;
}

.header{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 0;
  background:rgba(242,255,245,.9);
  backdrop-filter:blur(16px);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  color:#14532d;
}

.brand img{
  width:40px;
  height:40px;
  border-radius:14px;
  box-shadow:0 8px 22px rgba(20,83,45,.2);
}

.brand span{
  font-size:17px;
  letter-spacing:.03em;
}

.headerNav{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}

.headerNav a{
  padding:8px 12px;
  border-radius:999px;
  background:#fff;
  border:1px solid rgba(34,132,74,.18);
  color:#166534;
  font-size:12px;
  font-weight:900;
}

.headerNav a.active{
  background:#14532d;
  color:#fff;
}

.pageHero{
  position:relative;
  overflow:hidden;
  border-radius:34px;
  min-height:420px;
  background:
    linear-gradient(180deg,rgba(5,46,22,.12),rgba(5,46,22,.88)),
    url("images/activity/hero-video.jpg") center/cover no-repeat;
  box-shadow:0 28px 76px rgba(20,83,45,.23);
}

.pageHeroInner{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:26px;
  color:#fff;
}

.kicker{
  display:inline-flex;
  width:max-content;
  padding:8px 13px;
  border-radius:999px;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.28);
  color:#fef9c3;
  font-size:13px;
  font-weight:900;
}

.pageHero h1{
  margin:14px 0 0;
  font-size:clamp(38px,10vw,72px);
  line-height:1.04;
  font-weight:900;
  text-shadow:0 8px 26px rgba(0,0,0,.36);
}

.pageHero h1 span{
  display:block;
  color:#fef08a;
}

.pageHero p{
  max-width:760px;
  margin:14px 0 0;
  color:#ecfdf5;
  font-size:clamp(16px,4vw,22px);
  font-weight:850;
}

.section{
  margin-top:24px;
}

.card{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(34,132,74,.15);
  border-radius:30px;
  padding:20px;
  box-shadow:0 18px 52px rgba(20,83,45,.12);
}

.sectionTitle{
  margin:0;
  color:#14532d;
  font-size:clamp(26px,6vw,42px);
  line-height:1.25;
  font-weight:900;
}

.sectionLead{
  margin:8px 0 0;
  color:#365c46;
  font-weight:800;
}

.filterBox{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:16px;
}

.filterBtn{
  border:1px solid #bbf7d0;
  background:#fff;
  color:#166534;
  border-radius:999px;
  padding:9px 13px;
  font-weight:900;
  cursor:pointer;
}

.filterBtn.active{
  background:#14532d;
  color:#fff;
  border-color:#14532d;
}

.activityGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
}

.activityCard{
  overflow:hidden;
  border-radius:30px;
  background:#fff;
  border:1px solid #bbf7d0;
  box-shadow:0 18px 52px rgba(20,83,45,.12);
}

.imageScroller{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:10px;
  scroll-snap-type:x mandatory;
  background:#ecfdf5;
}

.imageScroller img{
  flex:0 0 88%;
  max-width:88%;
  aspect-ratio:16/10;
  object-fit:cover;
  border-radius:20px;
  scroll-snap-align:start;
  background:#d1fae5;
}

.cardBody{
  padding:18px;
}

.metaRow{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-bottom:10px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 10px;
  border-radius:999px;
  background:#dcfce7;
  color:#166534;
  border:1px solid #bbf7d0;
  font-size:12px;
  font-weight:900;
}

.badge.gold{
  background:#fef9c3;
  color:#713f12;
  border-color:#fde68a;
}

.activityTitle{
  margin:0;
  color:#14532d;
  font-size:23px;
  line-height:1.35;
  font-weight:900;
}

.activityText{
  margin:10px 0 0;
  color:#365c46;
  font-weight:760;
  white-space:pre-wrap;
}

.linkActions,
.shareActions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}

.smallBtn{
  border:0;
  border-radius:999px;
  padding:10px 13px;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  display:inline-block;
  text-align:center;
  background:#ecfdf5;
  color:#166534;
}

.btnMain{
  background:#fef08a;
  color:#14532d;
}

.btnGreen{
  background:#16a34a;
  color:#fff;
}

.btnDark{
  background:#14532d;
  color:#fff;
}

.btnLine{
  background:#06c755;
  color:#fff;
}

.btnX{
  background:#111827;
  color:#fff;
}

.btnFb{
  background:#1877f2;
  color:#fff;
}

.btnYoutube{
  background:#ff0033;
  color:#fff;
}

.emptyBox{
  border-radius:24px;
  background:#fff;
  border:1px dashed #86efac;
  color:#365c46;
  padding:18px;
  font-weight:800;
}

.footer{
  margin-top:34px;
  text-align:center;
  color:#365c46;
  font-size:13px;
  font-weight:800;
}

.bottomNav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:70;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  background:rgba(255,255,255,.96);
  border-top:1px solid rgba(34,132,74,.18);
  box-shadow:0 -12px 30px rgba(20,83,45,.12);
  backdrop-filter:blur(14px);
}

.bottomNav a{
  text-align:center;
  color:#166534;
  padding:8px 4px 7px;
  font-size:11px;
  font-weight:900;
}

.bottomNav a span{
  display:block;
  font-size:20px;
  line-height:1.1;
}

.bottomNav a.active{
  background:#dcfce7;
}

@media (min-width:820px){

  .activityGrid{
    grid-template-columns:1fr 1fr;
  }

  .imageScroller img{
    flex-basis:72%;
    max-width:72%;
  }

}

@media (max-width:560px){

  .headerNav{
    display:none;
  }

  .brand span{
    font-size:16px;
  }

  .pageHero{
    min-height:390px;
    border-radius:30px;
  }

  .pageHeroInner{
    padding:22px;
  }

  .card{
    border-radius:26px;
    padding:18px;
  }

  .smallBtn{
    flex:1 1 44%;
    padding:10px 8px;
  }

}
</style>
</head>

<body>

<div class="wrap">

<header class="header">
  <a class="brand" href="index.html">
    <img src="apple-touch-icon.png" alt="岩下りゅう">
    <span>岩下りゅう 活動報告</span>
  </a>

  <nav class="headerNav">
    <a class="active" href="activity.html">活動</a>
    <a href="videos.html">動画</a>
    <a href="voices.html">改善報告</a>
    <a href="profile.html">プロフィール</a>
    <a href="sns.html">SNS</a>
  </nav>
</header>

<main>

<section class="pageHero">
  <div class="pageHeroInner">
    <div class="kicker">写真と記録で見る</div>
    <h1>
      最新の
      <span>活動報告</span>
    </h1>
    <p>
      日付、テーマ、概要、写真、動画、関連リンクをまとめて掲載します。
    </p>
  </div>
</section>

<section id="themes" class="section card">
  <h2 class="sectionTitle">テーマ別に見る</h2>
  <p class="sectionLead">
    テーマを選ぶと、その活動だけを表示できます。
  </p>
  <div id="filterBox" class="filterBox"></div>
</section>

<section class="section">
  <div id="activityGrid" class="activityGrid"></div>
</section>

</main>

<footer class="footer">
  岩下りゅう 活動報告<br>
  地域での活動を、写真と動画でわかりやすく。
</footer>

</div>

<nav class="bottomNav">
  <a href="index.html"><span>🏠</span>トップ</a>
  <a class="active" href="activity.html"><span>📸</span>活動</a>
  <a href="videos.html"><span>🎥</span>動画</a>
  <a href="voices.html"><span>✅</span>成果</a>
  <a href="sns.html"><span>📱</span>SNS</a>
</nav>

<script>
const SITE_URL =
"https://ichirohns-jpg.github.io/iwashita-ryu-activity/activity.html";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzfLtQCO96cvV5bOVnu2L79xPOM6yaoTWKpvAuiN9Ru3NrQurh0PNKnUK86qmvMCkkIyw/exec";

let activities = [];
let currentTheme = "全部";

function clean(value){
  if(value === null || value === undefined){
    return "";
  }
  return String(value).trim();
}

function escapeHTML(text){
  return clean(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function enc(value){
  return encodeURIComponent(clean(value));
}

function dec(value){
  return decodeURIComponent(clean(value));
}

function toNumber(value,defaultValue){
  const n =
    Number(value);

  if(isNaN(n)){
    return defaultValue;
  }

  return n;
}

function shorten(text,count){
  const t =
    clean(text);

  if(t.length <= count){
    return t;
  }

  return t.slice(0,count) + "…";
}

function sortByOrder(a,b){
  return toNumber(a.order,9999) - toNumber(b.order,9999);
}

function loadJsonp(mode,callbackPrefix){
  return new Promise(function(resolve,reject){

    const callbackName =
      callbackPrefix +
      "_" +
      Date.now() +
      "_" +
      Math.random().toString(36).slice(2,8);

    const script =
      document.createElement("script");

    const params =
      new URLSearchParams();

    params.set("mode",mode);
    params.set("callback",callbackName);
    params.set("v",String(Date.now()));

    window[callbackName] = function(data){
      resolve(data);
      cleanup();
    };

    function cleanup(){
      try{
        delete window[callbackName];
      }catch(e){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    script.onerror = function(){
      cleanup();
      reject(new Error("読み込みに失敗しました"));
    };

    script.src =
      GAS_URL + "?" + params.toString();

    document.body.appendChild(script);

  });
}

function mapActivity(record,index){
  return {
    id:clean(record["ID"]) || "activity-" + index,
    date:clean(record["日付"]),
    theme:clean(record["テーマ"]),
    title:clean(record["タイトル"]),
    summary:clean(record["概要"]),
    images:[
      clean(record["画像URL1"]),
      clean(record["画像URL2"]),
      clean(record["画像URL3"]),
      clean(record["画像URL4"]),
      clean(record["画像URL5"])
    ].filter(Boolean),
    youtubeUrl:clean(record["YouTube URL"]),
    relatedUrl:clean(record["関連リンクURL"]),
    snsText:clean(record["SNS投稿文"]),
    order:toNumber(record["表示順"],index + 1),
    note:clean(record["備考"])
  };
}

function activityUrl(id){
  const url =
    new URL(SITE_URL);

  url.searchParams.set("activity",id);

  return url.toString();
}

function activityShareText(item){
  if(item.snsText){
    return item.snsText + "\n" + activityUrl(item.id);
  }

  return [
    "岩下りゅう 活動報告",
    "",
    item.title,
    "",
    shorten(item.summary,100),
    "",
    "#岩下りゅう",
    "#志木市",
    "#地域活動",
    "",
    activityUrl(item.id)
  ].join("\n");
}

function imageStripHTML(images,title){
  if(!images || images.length === 0){
    return "";
  }

  return `
    <div class="imageScroller">
      ${images.map(function(src,index){
        return `<img src="${escapeHTML(src)}" alt="${escapeHTML(title)} 写真${index + 1}">`;
      }).join("")}
    </div>
  `;
}

function renderFilters(){
  const box =
    document.getElementById("filterBox");

  const themes =
    ["全部"].concat(
      Array.from(
        new Set(
          activities
          .map(function(item){
            return item.theme;
          })
          .filter(Boolean)
        )
      )
    );

  box.innerHTML =
    themes.map(function(theme){
      const active =
        theme === currentTheme ? " active" : "";

      return `
        <button class="filterBtn${active}" type="button" onclick="setTheme('${enc(theme)}')">
          ${escapeHTML(theme)}
        </button>
      `;
    }).join("");
}

function setTheme(theme){
  currentTheme =
    dec(theme);

  renderFilters();
  renderActivities();
}

function filteredActivities(){
  if(currentTheme === "全部"){
    return activities;
  }

  return activities.filter(function(item){
    return item.theme === currentTheme;
  });
}

function shareLine(text,url){
  window.open(
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(url) +
    "&text=" +
    encodeURIComponent(text),
    "_blank"
  );
}

function shareX(text){
  window.open(
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text),
    "_blank"
  );
}

function shareFacebook(url){
  window.open(
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url),
    "_blank"
  );
}

function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(function(){
      alert("コピーしました。");
    }).catch(function(){
      fallbackCopy(text);
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const area =
    document.createElement("textarea");

  area.value = text;
  area.setAttribute("readonly","");
  area.style.position = "fixed";
  area.style.left = "-9999px";
  document.body.appendChild(area);
  area.select();

  try{
    document.execCommand("copy");
    alert("コピーしました。");
  }catch(e){
    alert("コピーできませんでした。");
  }

  document.body.removeChild(area);
}

function renderActivities(){
  const box =
    document.getElementById("activityGrid");

  const list =
    filteredActivities();

  if(list.length === 0){

    box.innerHTML = `
      <div class="emptyBox">
        活動報告は準備中です。<br>
        activity_list に「公開」の活動を入れると、ここに表示されます。
      </div>
    `;

    return;
  }

  box.innerHTML =
    list.map(function(item){

      const shareText =
        activityShareText(item);

      const shareUrl =
        activityUrl(item.id);

      return `
        <article class="activityCard" id="activity-${escapeHTML(item.id)}">
          ${imageStripHTML(item.images,item.title)}

          <div class="cardBody">

            <div class="metaRow">
              ${item.date ? `<span class="badge">${escapeHTML(item.date)}</span>` : ""}
              ${item.theme ? `<span class="badge gold">${escapeHTML(item.theme)}</span>` : ""}
            </div>

            <h3 class="activityTitle">${escapeHTML(item.title || "活動報告")}</h3>

            <p class="activityText">${escapeHTML(item.summary)}</p>

            <div class="linkActions">
              ${item.youtubeUrl ? `<a class="smallBtn btnYoutube" href="${escapeHTML(item.youtubeUrl)}" target="_blank" rel="noopener">YouTube</a>` : ""}
              ${item.relatedUrl ? `<a class="smallBtn btnGreen" href="${escapeHTML(item.relatedUrl)}" target="_blank" rel="noopener">関連リンク</a>` : ""}
            </div>

            <div class="shareActions">
              <button class="smallBtn btnLine" type="button" onclick="shareLine(${JSON.stringify(shareText)},'${escapeHTML(shareUrl)}')">LINE</button>
              <button class="smallBtn btnX" type="button" onclick="shareX(${JSON.stringify(shareText)})">X投稿</button>
              <button class="smallBtn btnFb" type="button" onclick="shareFacebook('${escapeHTML(shareUrl)}')">Facebook</button>
              <button class="smallBtn" type="button" onclick="copyText(${JSON.stringify(shareText)})">コピー</button>
            </div>

          </div>
        </article>
      `;
    }).join("");

}

function handleInitialJump(){
  const params =
    new URLSearchParams(location.search);

  const activityId =
    params.get("activity");

  if(activityId){
    setTimeout(function(){
      const el =
        document.getElementById("activity-" + activityId);

      if(el){
        el.scrollIntoView({
          behavior:"smooth",
          block:"center"
        });
      }
    },500);
  }
}

async function loadActivities(){

  try{

    const data =
      await loadJsonp("getActivities","activityCallback");

    if(data && data.ok && Array.isArray(data.records)){

      activities =
        data.records
        .map(mapActivity)
        .filter(function(item){
          return item.title || item.summary;
        })
        .sort(sortByOrder);

    }

  }catch(e){

    activities = [];

  }

  renderFilters();
  renderActivities();
  handleInitialJump();

}

loadActivities();
</script>

</body>
