<script>
const SITE_URL =
"https://ichirohns-jpg.github.io/iwashita-ryu-activity/activity.html";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyZxby2jvasBuYwoOptGppPTe4rcrdBRxArS4qUoEpCgPtxE_Ss9r9exb-A2r66XXagGw/exec";

let activities = [];
let currentTheme = "全部";

function clean(value){
  if(value === null || value === undefined){
    return "";
  }
  return String(value).trim();
}

function escapeHTML(text){
  return clean(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function enc(value){
  return encodeURIComponent(clean(value));
}

function dec(value){
  return decodeURIComponent(clean(value));
}

function toNumber(value,defaultValue){
  const n =
    Number(value);

  if(isNaN(n)){
    return defaultValue;
  }

  return n;
}

function shorten(text,count){
  const t =
    clean(text);

  if(t.length <= count){
    return t;
  }

  return t.slice(0,count) + "…";
}

function sortByOrder(a,b){
  return toNumber(a.order,9999) - toNumber(b.order,9999);
}

function loadJsonp(mode,callbackPrefix){
  return new Promise(function(resolve,reject){

    const callbackName =
      callbackPrefix +
      "_" +
      Date.now() +
      "_" +
      Math.random().toString(36).slice(2,8);

    const script =
      document.createElement("script");

    const params =
      new URLSearchParams();

    params.set("mode",mode);
    params.set("callback",callbackName);
    params.set("v",String(Date.now()));

    window[callbackName] = function(data){
      resolve(data);
      cleanup();
    };

    function cleanup(){
      try{
        delete window[callbackName];
      }catch(e){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    script.onerror = function(){
      cleanup();
      reject(new Error("読み込みに失敗しました"));
    };

    script.src =
      GAS_URL + "?" + params.toString();

    document.body.appendChild(script);

  });
}

function mapActivity(record,index){
  return {
    id:clean(record["ID"]) || "activity-" + index,
    date:clean(record["日付"]),
    theme:clean(record["テーマ"]),
    title:clean(record["タイトル"]),
    summary:clean(record["概要"]),
    images:[
      clean(record["画像URL1"]),
      clean(record["画像URL2"]),
      clean(record["画像URL3"]),
      clean(record["画像URL4"]),
      clean(record["画像URL5"])
    ].filter(Boolean),
    snsText:clean(record["SNS投稿文"]),
    order:toNumber(record["表示順"],index + 1),
    note:clean(record["備考"])
  };
}

function activityUrl(id){
  const url =
    new URL(SITE_URL);

  url.searchParams.set("activity",id);

  return url.toString();
}

function activityShareText(item){
  if(item.snsText){
    return item.snsText + "\n" + activityUrl(item.id);
  }

  return [
    "岩下りゅう 活動報告",
    "",
    item.title,
    "",
    shorten(item.summary,100),
    "",
    "#岩下りゅう",
    "#志木市",
    "#地域活動",
    "",
    activityUrl(item.id)
  ].join("\n");
}

function imageStripHTML(images,title){
  if(!images || images.length === 0){
    return "";
  }

  return `
    <div class="imageScroller">
      ${images.map(function(src,index){
        return `<img src="${escapeHTML(src)}" alt="${escapeHTML(title)} 写真${index + 1}">`;
      }).join("")}
    </div>
  `;
}

function renderFilters(){
  const box =
    document.getElementById("filterBox");

  const themes =
    ["全部"].concat(
      Array.from(
        new Set(
          activities
          .map(function(item){
            return item.theme;
          })
          .filter(Boolean)
        )
      )
    );

  box.innerHTML =
    themes.map(function(theme){
      const active =
        theme === currentTheme ? " active" : "";

      return `
        <button class="filterBtn${active}" type="button" onclick="setTheme('${enc(theme)}')">
          ${escapeHTML(theme)}
        </button>
      `;
    }).join("");
}

function setTheme(theme){
  currentTheme =
    dec(theme);

  renderFilters();
  renderActivities();
}

function filteredActivities(){
  if(currentTheme === "全部"){
    return activities;
  }

  return activities.filter(function(item){
    return item.theme === currentTheme;
  });
}

function shareLine(text,url){
  window.open(
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(url) +
    "&text=" +
    encodeURIComponent(text),
    "_blank"
  );
}

function shareX(text){
  window.open(
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text),
    "_blank"
  );
}

function shareFacebook(url){
  window.open(
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url),
    "_blank"
  );
}

function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(function(){
      alert("コピーしました。");
    }).catch(function(){
      fallbackCopy(text);
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const area =
    document.createElement("textarea");

  area.value = text;
  area.setAttribute("readonly","");
  area.style.position = "fixed";
  area.style.left = "-9999px";
  document.body.appendChild(area);
  area.select();

  try{
    document.execCommand("copy");
    alert("コピーしました。");
  }catch(e){
    alert("コピーできませんでした。");
  }

  document.body.removeChild(area);
}

function renderActivities(){
  const box =
    document.getElementById("activityGrid");

  const list =
    filteredActivities();

  if(list.length === 0){

    box.innerHTML = `
      <div class="emptyBox">
        活動報告は準備中です。<br>
        activity_list に「公開」の活動を入れると、ここに表示されます。
      </div>
    `;

    return;
  }

  box.innerHTML =
    list.map(function(item){

      const shareText =
        activityShareText(item);

      const shareUrl =
        activityUrl(item.id);

      return `
        <article class="activityCard" id="activity-${escapeHTML(item.id)}">
          ${imageStripHTML(item.images,item.title)}

          <div class="cardBody">

            <div class="metaRow">
              ${item.date ? `<span class="badge">${escapeHTML(item.date)}</span>` : ""}
              ${item.theme ? `<span class="badge gold">${escapeHTML(item.theme)}</span>` : ""}
            </div>

            <h3 class="activityTitle">${escapeHTML(item.title || "活動報告")}</h3>

            <p class="activityText">${escapeHTML(item.summary)}</p>

            <div class="shareActions">
              <button class="smallBtn btnLine" type="button" onclick="shareLine(${JSON.stringify(shareText)},'${escapeHTML(shareUrl)}')">LINE</button>
              <button class="smallBtn btnX" type="button" onclick="shareX(${JSON.stringify(shareText)})">X投稿</button>
              <button class="smallBtn btnFb" type="button" onclick="shareFacebook('${escapeHTML(shareUrl)}')">Facebook</button>
              <button class="smallBtn btnCopy" type="button" onclick="copyText(${JSON.stringify(shareText)})">コピー</button>
            </div>

          </div>
        </article>
      `;
    }).join("");

}

function handleInitialJump(){
  const params =
    new URLSearchParams(location.search);

  const activityId =
    params.get("activity");

  if(activityId){
    setTimeout(function(){
      const el =
        document.getElementById("activity-" + activityId);

      if(el){
        el.scrollIntoView({
          behavior:"smooth",
          block:"center"
        });
      }
    },500);
  }
}

async function loadActivities(){

  try{

    const data =
      await loadJsonp("getActivities","activityCallback");

    if(data && data.ok && Array.isArray(data.records)){

      activities =
        data.records
        .map(mapActivity)
        .filter(function(item){
          return item.title || item.summary;
        })
        .sort(sortByOrder);

    }

  }catch(e){

    activities = [];

  }

  renderFilters();
  renderActivities();
  handleInitialJump();

}

loadActivities();
</script>
