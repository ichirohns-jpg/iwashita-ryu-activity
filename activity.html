<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>活動報告｜岩下りゅう 活動報告</title>

<meta name="description" content="岩下りゅうの活動報告。地域活動、まちづくり、写真、SNS投稿をわかりやすく掲載します。">
<meta name="theme-color" content="#6fbd69">

<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#203326;
  background:
    radial-gradient(circle at 10% 0%,rgba(218,255,209,.9),transparent 28%),
    radial-gradient(circle at 90% 5%,rgba(255,246,176,.55),transparent 25%),
    linear-gradient(180deg,#f8fff5 0%,#ffffff 48%,#edfbea 100%);
  line-height:1.75;
  -webkit-text-size-adjust:100%;
}

a{
  color:inherit;
  text-decoration:none;
}

img{
  max-width:100%;
}

.wrap{
  width:min(1080px,94%);
  margin:auto;
  padding:12px 0 96px;
}

/* ヘッダー */

.header{
  position:sticky;
  top:0;
  z-index:80;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 0;
  background:rgba(248,255,245,.94);
  backdrop-filter:blur(16px);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  color:#1f5f35;
  font-weight:900;
}

.brand img{
  width:44px;
  height:44px;
  border-radius:16px;
  object-fit:cover;
  box-shadow:0 8px 22px rgba(70,130,82,.18);
}

.brand span{
  font-size:18px;
  line-height:1.25;
}

.headerNav{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}

.headerNav a{
  padding:9px 13px;
  border-radius:999px;
  background:#fff;
  border:1px solid #b7ebc0;
  color:#1f6b3d;
  font-size:13px;
  font-weight:900;
  box-shadow:0 6px 16px rgba(70,130,82,.07);
}

/* ページ上部 */

.hero{
  margin-top:8px;
  border-radius:32px;
  background:
    radial-gradient(circle at 100% 0%,rgba(255,246,176,.48),transparent 34%),
    linear-gradient(135deg,#ffffff 0%,#f4fff1 100%);
  border:1px solid #b7ebc0;
  box-shadow:0 16px 40px rgba(70,130,82,.11);
  padding:22px;
}

.kicker{
  display:inline-flex;
  padding:8px 13px;
  border-radius:999px;
  background:#e6ffe9;
  border:1px solid #b7ebc0;
  color:#1f6b3d;
  font-size:14px;
  font-weight:900;
}

.hero h1{
  margin:14px 0 0;
  color:#1f5f35;
  font-size:clamp(40px,10vw,66px);
  line-height:1.08;
  font-weight:900;
}

.hero p{
  margin:12px 0 0;
  color:#344c39;
  font-size:18px;
  font-weight:850;
}

/* 活動一覧 */

.listSection{
  margin-top:22px;
}

.listHead{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

.listHead h2{
  margin:0;
  color:#1f5f35;
  font-size:clamp(34px,8vw,54px);
  line-height:1.15;
  font-weight:900;
}

.reloadBtn{
  border:0;
  border-radius:999px;
  background:#fff;
  border:2px solid #b7ebc0;
  color:#1f5f35;
  font-family:inherit;
  font-size:15px;
  font-weight:900;
  padding:10px 14px;
}

.activityList{
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
}

.activityCard{
  overflow:hidden;
  border-radius:32px;
  background:#fff;
  border:1px solid #b7ebc0;
  box-shadow:0 16px 40px rgba(70,130,82,.11);
}

.activityImage{
  display:block;
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  background:#e6ffe9;
}

.activityBody{
  padding:20px;
}

.metaRow{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:12px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 11px;
  border-radius:999px;
  background:#e6ffe9;
  border:1px solid #b7ebc0;
  color:#1f6b3d;
  font-size:13px;
  font-weight:900;
}

.activityTitle{
  margin:0;
  color:#1f5f35;
  font-size:clamp(27px,6vw,42px);
  line-height:1.25;
  font-weight:900;
}

.activitySummary{
  margin:12px 0 0;
  color:#3c5943;
  font-size:18px;
  line-height:1.7;
  font-weight:850;
  white-space:pre-wrap;
}

.photoGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-top:16px;
}

.photoGrid img{
  width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  border-radius:18px;
  border:1px solid #d6f3d8;
  background:#e6ffe9;
}

.shareBox{
  margin-top:18px;
  border-radius:24px;
  background:#f7fff5;
  border:1px solid #c8f0ce;
  padding:14px;
}

.shareTitle{
  color:#1f5f35;
  font-size:17px;
  font-weight:900;
  margin-bottom:10px;
}

.shareButtons{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.shareButtons a,
.shareButtons button{
  min-height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:18px;
  border:2px solid #b7ebc0;
  background:#fff;
  color:#1f5f35;
  font-family:inherit;
  font-size:16px;
  font-weight:900;
}

.shareButtons button{
  cursor:pointer;
}

.empty{
  border-radius:28px;
  background:#fff;
  border:1px solid #b7ebc0;
  box-shadow:0 12px 30px rgba(71,130,82,.10);
  padding:22px;
  color:#4d6b55;
}

.empty h3{
  margin:0;
  color:#1f5f35;
  font-size:26px;
  line-height:1.3;
  font-weight:900;
}

.empty p{
  margin:10px 0 0;
  font-size:18px;
  line-height:1.7;
  font-weight:850;
}

/* 下の導線 */

.nextAction{
  margin-top:22px;
  border-radius:30px;
  background:#fff;
  border:1px solid #b7ebc0;
  box-shadow:0 12px 30px rgba(71,130,82,.10);
  padding:18px;
}

.nextAction h2{
  margin:0;
  color:#1f5f35;
  font-size:28px;
  line-height:1.25;
  font-weight:900;
}

.nextAction p{
  margin:8px 0 0;
  color:#4d6b55;
  font-size:16px;
  font-weight:850;
}

.nextButtons{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:14px;
}

.nextButtons a{
  min-height:62px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:24px;
  background:#fff;
  border:2px solid #b7ebc0;
  color:#1f5f35;
  font-size:20px;
  font-weight:900;
}

.nextButtons a.support{
  background:linear-gradient(135deg,#fff7c2 0%,#facc15 100%);
  border-color:#facc15;
  color:#5c3b00;
}

/* 下メニュー */

.bottomNav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:100;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  background:rgba(255,255,255,.98);
  border-top:1px solid #b7ebc0;
  box-shadow:0 -12px 30px rgba(71,130,82,.12);
  backdrop-filter:blur(14px);
}

.bottomNav a{
  text-align:center;
  color:#1f6b3d;
  padding:8px 4px 7px;
  font-size:12px;
  font-weight:900;
}

.bottomNav a span{
  display:block;
  font-size:22px;
  line-height:1.1;
}

.bottomNav a.active{
  background:#e2f8e5;
  color:#14532d;
}

.footer{
  margin-top:30px;
  text-align:center;
  color:#4d6b55;
  font-size:13px;
  font-weight:800;
}

@media (min-width:820px){
  .activityList{
    grid-template-columns:repeat(2,1fr);
  }

  .activityCard:first-child{
    grid-column:1 / -1;
  }

  .activityCard:first-child .activityImage{
    aspect-ratio:21/9;
  }

  .nextButtons{
    grid-template-columns:1fr 1fr;
  }
}

@media (max-width:560px){
  .wrap{
    width:94%;
  }

  .headerNav{
    display:none;
  }

  .brand span{
    font-size:16px;
  }

  .hero{
    border-radius:28px;
    padding:18px;
  }

  .listHead{
    align-items:flex-start;
    flex-direction:column;
  }

  .activityBody{
    padding:18px;
  }

  .shareButtons{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>

<body>

<div class="wrap">

<header class="header">
  <a class="brand" href="index.html">
    <img src="apple-touch-icon.png" alt="岩下りゅう">
    <span>岩下りゅう 活動報告</span>
  </a>

  <nav class="headerNav">
    <a href="index.html">トップ</a>
    <a href="activity.html">活動</a>
    <a href="videos.html">動画</a>
    <a href="support.html">応援</a>
    <a href="profile.html">人物</a>
  </nav>
</header>

<main>

<section class="hero">
  <div class="kicker">写真で見る活動</div>
  <h1>活動報告</h1>
  <p>
    地域活動、商店会、文化・歴史、まちづくりの活動を、写真と文章でわかりやすく掲載します。
  </p>
</section>

<section class="listSection">
  <div class="listHead">
    <h2>最新の活動</h2>
    <button class="reloadBtn" type="button" onclick="loadActivities()">更新</button>
  </div>

  <div id="activityList" class="activityList">
    <div class="empty">
      <h3>活動報告を読み込み中です。</h3>
      <p>少しお待ちください。</p>
    </div>
  </div>
</section>

<section class="nextAction">
  <h2>活動を見たあとは</h2>
  <p>
    応援メッセージやプロフィールもご覧いただけます。
  </p>

  <div class="nextButtons">
    <a class="support" href="support.html">応援メッセージを書く</a>
    <a href="profile.html">岩下りゅうとは</a>
  </div>
</section>

</main>

<footer class="footer">
  岩下りゅう 活動報告<br>
  地域での活動を、写真と動画でわかりやすく。
</footer>

</div>

<nav class="bottomNav">
  <a href="index.html"><span>🏠</span>トップ</a>
  <a href="activity.html" class="active"><span>📸</span>活動</a>
  <a href="videos.html"><span>🎥</span>動画</a>
  <a href="support.html"><span>💬</span>応援</a>
  <a href="profile.html"><span>👤</span>人物</a>
</nav>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbyv9uOF69WBCc5DKlCr0ZUbQqbWUu30qqA4fCl5EznNA3RfBxlKsDIvAMK4SldJvW4k9g/exec";

const activityList =
document.getElementById("activityList");

function esc(v){
  return String(v || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;")
  .replace(/'/g,"&#39;");
}

function cleanUrl(v){
  return String(v || "").trim();
}

function getImages(r){

  const imgs = [];

  [
    "画像URL1",
    "画像URL2",
    "画像URL3",
    "画像URL4",
    "画像URL5"
  ].forEach(function(key){

    const url =
    cleanUrl(r[key]);

    if(url){
      imgs.push(url);
    }

  });

  return imgs;

}

function activityShareUrl(id){

  const base =
  location.origin +
  location.pathname;

  if(id){
    return base + "#activity-" + encodeURIComponent(id);
  }

  return base;

}

function makeShareText(title, summary){

  const text =
  (title || "岩下りゅう 活動報告") +
  "\n" +
  (summary || "");

  return text.trim();

}

function copyActivity(title,url){

  const text =
  title + "\n" + url;

  if(navigator.clipboard){
    navigator.clipboard.writeText(text)
    .then(function(){
      alert("リンクをコピーしました。");
    })
    .catch(function(){
      alert("コピーできませんでした。");
    });
    return;
  }

  alert(url);

}

function activityCard(r,index){

  const id =
  r["ID"] ||
  "";

  const date =
  r["日付"] ||
  r["日時"] ||
  "";

  const theme =
  r["テーマ"] ||
  "";

  const title =
  r["タイトル"] ||
  "活動報告";

  const summary =
  r["概要"] ||
  "";

  const snsText =
  r["SNS投稿文"] ||
  "";

  const images =
  getImages(r);

  const mainImage =
  images[0] ||
  "images/activity/hero-main.jpg";

  const shareUrl =
  activityShareUrl(id);

  const shareText =
  makeShareText(
    title,
    snsText || summary
  );

  const lineUrl =
  "https://social-plugins.line.me/lineit/share?url=" +
  encodeURIComponent(shareUrl);

  const xUrl =
  "https://twitter.com/intent/tweet?text=" +
  encodeURIComponent(shareText) +
  "&url=" +
  encodeURIComponent(shareUrl);

  const fbUrl =
  "https://www.facebook.com/sharer/sharer.php?u=" +
  encodeURIComponent(shareUrl);

  const extraImages =
  images
  .slice(1)
  .map(function(url){
    return '<img src="' + esc(url) + '" alt="">';
  })
  .join("");

  return ''
  + '<article class="activityCard" id="activity-' + esc(id || String(index + 1)) + '">'
  + '<img class="activityImage" src="' + esc(mainImage) + '" alt="' + esc(title) + '">'
  + '<div class="activityBody">'
  + '<div class="metaRow">'
  + (date ? '<span class="badge">📅 ' + esc(date) + '</span>' : '')
  + (theme ? '<span class="badge">📍 ' + esc(theme) + '</span>' : '')
  + '</div>'
  + '<h2 class="activityTitle">' + esc(title) + '</h2>'
  + (summary ? '<div class="activitySummary">' + esc(summary) + '</div>' : '')
  + (extraImages ? '<div class="photoGrid">' + extraImages + '</div>' : '')
  + '<div class="shareBox">'
  + '<div class="shareTitle">この活動を共有する</div>'
  + '<div class="shareButtons">'
  + '<a href="' + esc(lineUrl) + '" target="_blank" rel="noopener">LINE</a>'
  + '<a href="' + esc(xUrl) + '" target="_blank" rel="noopener">X</a>'
  + '<a href="' + esc(fbUrl) + '" target="_blank" rel="noopener">Facebook</a>'
  + '<button type="button" onclick="copyActivity(' + JSON.stringify(title) + ',' + JSON.stringify(shareUrl) + ')">コピー</button>'
  + '</div>'
  + '</div>'
  + '</div>'
  + '</article>';

}

function loadActivities(){

  activityList.innerHTML =
  '<div class="empty"><h3>活動報告を読み込み中です。</h3><p>少しお待ちください。</p></div>';

  const url =
  GAS_URL +
  "?mode=getActivities&t=" +
  Date.now();

  fetch(url)
  .then(function(res){
    return res.json();
  })
  .then(function(data){

    const records =
    data && data.records
    ? data.records
    : [];

    if(!records.length){
      activityList.innerHTML =
      '<div class="empty"><h3>現在、公開中の活動報告は準備中です。</h3><p>公開された活動報告は、このページに順番に表示されます。</p></div>';
      return;
    }

    activityList.innerHTML =
    records.map(activityCard).join("");

  })
  .catch(function(){

    activityList.innerHTML =
    '<div class="empty"><h3>活動報告を読み込めませんでした。</h3><p>時間をおいて、もう一度開いてください。</p></div>';

  });

}

loadActivities();
</script>

</body>
</html>
