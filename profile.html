<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzfLtQCO96cvV5bOVnu2L79xPOM6yaoTWKpvAuiN9Ru3NrQurh0PNKnUK86qmvMCkkIyw/exec";

let profiles = [];

const fallbackProfiles = [
  {
    id:"profile-001",
    item:"紹介",
    title:"岩下りゅうとは",
    body:"志木市生まれ。地域活動、商店会活動、歴史・文化の魅力発信に取り組んでいます。",
    url:"",
    imageUrl:"",
    order:1
  },
  {
    id:"profile-002",
    item:"歩み",
    title:"これまでの歩み",
    body:"広告代理店・出版社での経験を経て、志木市で事業を立ち上げ、地域に根ざした活動を続けています。",
    url:"",
    imageUrl:"",
    order:2
  },
  {
    id:"profile-003",
    item:"想い",
    title:"活動への想い",
    body:"地域の声を聞き、現場を見て、できることを一つずつ形にしていくことを大切にしています。",
    url:"",
    imageUrl:"",
    order:3
  },
  {
    id:"profile-004",
    item:"地域活動",
    title:"地域との関わり",
    body:"商店会、文化・歴史、まちづくり、地域イベントなど、志木の魅力を伝える活動に関わっています。",
    url:"",
    imageUrl:"",
    order:4
  }
];

function clean(value){
  if(value === null || value === undefined){
    return "";
  }
  return String(value).trim();
}

function escapeHTML(text){
  return clean(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function toNumber(value,defaultValue){
  const n =
    Number(value);

  if(isNaN(n)){
    return defaultValue;
  }

  return n;
}

function sortByOrder(a,b){
  return toNumber(a.order,9999) - toNumber(b.order,9999);
}

function loadJsonp(mode,callbackPrefix){
  return new Promise(function(resolve,reject){

    const callbackName =
      callbackPrefix +
      "_" +
      Date.now() +
      "_" +
      Math.random().toString(36).slice(2,8);

    const script =
      document.createElement("script");

    const params =
      new URLSearchParams();

    params.set("mode",mode);
    params.set("callback",callbackName);
    params.set("v",String(Date.now()));

    window[callbackName] = function(data){
      resolve(data);
      cleanup();
    };

    function cleanup(){
      try{
        delete window[callbackName];
      }catch(e){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    script.onerror = function(){
      cleanup();
      reject(new Error("読み込みに失敗しました"));
    };

    script.src =
      GAS_URL + "?" + params.toString();

    document.body.appendChild(script);

  });
}

function mapProfile(record,index){
  return {
    id:clean(record["ID"]) || "profile-" + index,
    item:clean(record["項目"]),
    title:clean(record["タイトル"]),
    body:clean(record["本文"]),
    url:clean(record["URL"]),
    imageUrl:clean(record["画像URL"]),
    order:toNumber(record["表示順"],index + 1)
  };
}

function renderProfiles(){
  const box =
    document.getElementById("profileGrid");

  const list =
    profiles.length > 0
      ? profiles
      : fallbackProfiles;

  if(list.length === 0){
    box.innerHTML = `
      <div class="emptyBox">
        プロフィール情報は準備中です。
      </div>
    `;
    return;
  }

  box.innerHTML =
    list.map(function(item){

      const image =
        item.imageUrl
        ? `
          <div class="profileItemImage">
            <img src="${escapeHTML(item.imageUrl)}" alt="${escapeHTML(item.title)}">
          </div>
        `
        : "";

      const link =
        item.url
        ? `
          <div class="linkActions">
            <a class="smallBtn btnGreen" href="${escapeHTML(item.url)}" target="_blank" rel="noopener">詳しく見る</a>
          </div>
        `
        : "";

      return `
        <article class="profileItem">
          ${image}
          <div class="profileItemBody">
            ${item.item ? `<div class="itemMeta">${escapeHTML(item.item)}</div>` : ""}
            <h3>${escapeHTML(item.title || "プロフィール")}</h3>
            <p>${escapeHTML(item.body)}</p>
            ${link}
          </div>
        </article>
      `;
    }).join("");
}

async function loadProfiles(){

  try{

    const data =
      await loadJsonp("getProfile","profileCallback");

    if(data && data.ok && Array.isArray(data.records)){

      profiles =
        data.records
        .map(mapProfile)
        .filter(function(item){
          return item.title || item.body;
        })
        .sort(sortByOrder);

    }

  }catch(e){

    profiles = [];

  }

  renderProfiles();

}

loadProfiles();
</script>
