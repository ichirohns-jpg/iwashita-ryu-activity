
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>動画で見る活動｜岩下りゅう 活動報告</title>

<meta name="description" content="岩下りゅうの活動を動画でわかりやすく紹介します。">
<meta name="theme-color" content="#6fbd69">

<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#203326;
  background:
    radial-gradient(circle at 10% 0%,rgba(218,255,209,.9),transparent 28%),
    radial-gradient(circle at 90% 5%,rgba(255,246,176,.55),transparent 25%),
    linear-gradient(180deg,#f8fff5 0%,#ffffff 48%,#edfbea 100%);
  line-height:1.75;
  -webkit-text-size-adjust:100%;
}

a{
  color:inherit;
  text-decoration:none;
}

img{
  max-width:100%;
}

.wrap{
  width:min(1080px,94%);
  margin:auto;
  padding:12px 0 96px;
}

/* ヘッダー */

.header{
  position:sticky;
  top:0;
  z-index:80;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 0;
  background:rgba(248,255,245,.94);
  backdrop-filter:blur(16px);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  color:#1f5f35;
  font-weight:900;
}

.brand img{
  width:44px;
  height:44px;
  border-radius:16px;
  object-fit:cover;
  box-shadow:0 8px 22px rgba(70,130,82,.18);
}

.brand span{
  font-size:18px;
  line-height:1.25;
}

.headerNav{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}

.headerNav a{
  padding:9px 13px;
  border-radius:999px;
  background:#fff;
  border:1px solid #b7ebc0;
  color:#1f6b3d;
  font-size:13px;
  font-weight:900;
  box-shadow:0 6px 16px rgba(70,130,82,.07);
}

/* ページ上部 */

.hero{
  margin-top:8px;
  border-radius:32px;
  background:
    radial-gradient(circle at 100% 0%,rgba(255,246,176,.48),transparent 34%),
    linear-gradient(135deg,#ffffff 0%,#f4fff1 100%);
  border:1px solid #b7ebc0;
  box-shadow:0 16px 40px rgba(70,130,82,.11);
  padding:22px;
}

.kicker{
  display:inline-flex;
  padding:8px 13px;
  border-radius:999px;
  background:#e6ffe9;
  border:1px solid #b7ebc0;
  color:#1f6b3d;
  font-size:14px;
  font-weight:900;
}

.hero h1{
  margin:14px 0 0;
  color:#1f5f35;
  font-size:clamp(38px,10vw,66px);
  line-height:1.08;
  font-weight:900;
}

.hero p{
  margin:12px 0 0;
  color:#344c39;
  font-size:18px;
  font-weight:850;
}

/* 動画一覧 */

.listSection{
  margin-top:22px;
}

.listHead{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

.listHead h2{
  margin:0;
  color:#1f5f35;
  font-size:clamp(34px,8vw,54px);
  line-height:1.15;
  font-weight:900;
}

.reloadBtn{
  border:0;
  border-radius:999px;
  background:#fff;
  border:2px solid #b7ebc0;
  color:#1f5f35;
  font-family:inherit;
  font-size:15px;
  font-weight:900;
  padding:10px 14px;
}

.videoList{
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
}

.videoCard{
  overflow:hidden;
  border-radius:32px;
  background:#fff;
  border:1px solid #b7ebc0;
  box-shadow:0 16px 40px rgba(70,130,82,.11);
}

.videoFrame{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#dff8df;
}

.videoFrame iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
}

.videoBody{
  padding:20px;
}

.metaRow{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:12px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 11px;
  border-radius:999px;
  background:#e6ffe9;
  border:1px solid #b7ebc0;
  color:#1f6b3d;
  font-size:13px;
  font-weight:900;
}

.videoTitle{
  margin:0;
  color:#1f5f35;
  font-size:clamp(27px,6vw,42px);
  line-height:1.25;
  font-weight:900;
}

.videoSummary{
  margin:12px 0 0;
  color:#3c5943;
  font-size:18px;
  line-height:1.7;
  font-weight:850;
  white-space:pre-wrap;
}

.videoButtons{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:16px;
}

.videoButtons a,
.videoButtons button{
  min-height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:20px;
  background:#fff;
  border:2px solid #b7ebc0;
  color:#1f5f35;
  font-family:inherit;
  font-size:17px;
  font-weight:900;
}

.videoButtons a.primary{
  background:linear-gradient(135deg,#4caf63 0%,#78c96f 100%);
  border-color:#78c96f;
  color:#fff;
}

.empty{
  border-radius:28px;
  background:#fff;
  border:1px solid #b7ebc0;
  box-shadow:0 12px 30px rgba(71,130,82,.10);
  padding:22px;
  color:#4d6b55;
}

.empty h3{
  margin:0;
  color:#1f5f35;
  font-size:26px;
  line-height:1.3;
  font-weight:900;
}

.empty p{
  margin:10px 0 0;
  font-size:18px;
  line-height:1.7;
  font-weight:850;
}

/* 下の導線 */

.nextAction{
  margin-top:22px;
  border-radius:30px;
  background:#fff;
  border:1px solid #b7ebc0;
  box-shadow:0 12px 30px rgba(71,130,82,.10);
  padding:18px;
}

.nextAction h2{
  margin:0;
  color:#1f5f35;
  font-size:28px;
  line-height:1.25;
  font-weight:900;
}

.nextAction p{
  margin:8px 0 0;
  color:#4d6b55;
  font-size:16px;
  font-weight:850;
}

.nextButtons{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:14px;
}

.nextButtons a{
  min-height:62px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:24px;
  background:#fff;
  border:2px solid #b7ebc0;
  color:#1f5f35;
  font-size:20px;
  font-weight:900;
}

.nextButtons a.support{
  background:linear-gradient(135deg,#fff7c2 0%,#facc15 100%);
  border-color:#facc15;
  color:#5c3b00;
}

/* 下メニュー */

.bottomNav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:100;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  background:rgba(255,255,255,.98);
  border-top:1px solid #b7ebc0;
  box-shadow:0 -12px 30px rgba(71,130,82,.12);
  backdrop-filter:blur(14px);
}

.bottomNav a{
  text-align:center;
  color:#1f6b3d;
  padding:8px 4px 7px;
  font-size:12px;
  font-weight:900;
}

.bottomNav a span{
  display:block;
  font-size:22px;
  line-height:1.1;
}

.bottomNav a.active{
  background:#e2f8e5;
  color:#14532d;
}

.footer{
  margin-top:30px;
  text-align:center;
  color:#4d6b55;
  font-size:13px;
  font-weight:800;
}

@media (min-width:820px){
  .videoList{
    grid-template-columns:repeat(2,1fr);
  }

  .videoCard:first-child{
    grid-column:1 / -1;
  }

  .nextButtons{
    grid-template-columns:1fr 1fr;
  }

  .videoButtons{
    grid-template-columns:1fr 1fr;
  }
}

@media (max-width:560px){
  .wrap{
    width:94%;
  }

  .headerNav{
    display:none;
  }

  .brand span{
    font-size:16px;
  }

  .hero{
    border-radius:28px;
    padding:18px;
  }

  .listHead{
    align-items:flex-start;
    flex-direction:column;
  }

  .videoBody{
    padding:18px;
  }
}
</style>
</head>

<body>

<div class="wrap">

<header class="header">
  <a class="brand" href="index.html">
    <img src="apple-touch-icon.png" alt="岩下りゅう">
    <span>岩下りゅう 活動報告</span>
  </a>

  <nav class="headerNav">
    <a href="index.html">トップ</a>
    <a href="activity.html">活動</a>
    <a href="videos.html">動画</a>
    <a href="support.html">応援</a>
    <a href="profile.html">人物</a>
  </nav>
</header>

<main>

<section class="hero">
  <div class="kicker">動画で見る活動</div>
  <h1>動画</h1>
  <p>
    地域での活動やメッセージを、動画でわかりやすく紹介します。
  </p>
</section>

<section class="listSection">
  <div class="listHead">
    <h2>公開中の動画</h2>
    <button class="reloadBtn" type="button" onclick="loadVideos()">更新</button>
  </div>

  <div id="videoList" class="videoList">
    <div class="empty">
      <h3>動画を読み込み中です。</h3>
      <p>少しお待ちください。</p>
    </div>
  </div>
</section>

<section class="nextAction">
  <h2>動画を見たあとは</h2>
  <p>
    写真つきの活動報告や、応援メッセージもご覧いただけます。
  </p>

  <div class="nextButtons">
    <a href="activity.html">活動を見る</a>
    <a class="support" href="support.html">応援メッセージを書く</a>
  </div>
</section>

</main>

<footer class="footer">
  岩下りゅう 活動報告<br>
  地域での活動を、写真と動画でわかりやすく。
</footer>

</div>

<nav class="bottomNav">
  <a href="index.html"><span>🏠</span>トップ</a>
  <a href="activity.html"><span>📸</span>活動</a>
  <a href="videos.html" class="active"><span>🎥</span>動画</a>
  <a href="support.html"><span>💬</span>応援</a>
  <a href="profile.html"><span>👤</span>人物</a>
</nav>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbyv9uOF69WBCc5DKlCr0ZUbQqbWUu30qqA4fCl5EznNA3RfBxlKsDIvAMK4SldJvW4k9g/exec";

const videoList =
document.getElementById("videoList");

function esc(v){
  return String(v || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;")
  .replace(/'/g,"&#39;");
}

function escAttr(v){
  return esc(v);
}

function findVideoUrl(record){

  const urls = [];

  Object.keys(record || {}).forEach(function(key){

    const value =
    String(record[key] || "");

    const matches =
    value.match(/https?:\/\/[^\s"'<>]+/g);

    if(matches){
      matches.forEach(function(url){
        const clean =
        url
        .replace(/\\/g,"")
        .replace(/[、。]+$/,"")
        .trim();

        if(
          clean.indexOf("youtube.com") !== -1 ||
          clean.indexOf("youtu.be") !== -1
        ){
          urls.push(clean);
        }
      });
    }

  });

  return urls[0] || "";

}

function youtubeId(url){

  const raw =
  String(url || "").trim();

  if(!raw){
    return "";
  }

  try{

    const u =
    new URL(raw);

    if(u.hostname.indexOf("youtu.be") !== -1){
      return u.pathname.replace("/","").split("/")[0];
    }

    if(u.searchParams.get("v")){
      return u.searchParams.get("v");
    }

    const shorts =
    u.pathname.match(/\/shorts\/([^/?]+)/);

    if(shorts){
      return shorts[1];
    }

    const embed =
    u.pathname.match(/\/embed\/([^/?]+)/);

    if(embed){
      return embed[1];
    }

  }catch(err){}

  return "";

}

function youtubeEmbed(url){

  const id =
  youtubeId(url);

  if(!id){
    return "";
  }

  return "https://www.youtube.com/embed/" + id;

}

function shortDate(v){

  const s =
  String(v || "");

  if(!s){
    return "";
  }

  return s
  .replace(/\s\d{2}:\d{2}.*/,"")
  .replace(/-/g,"/");
}

function videoShareUrl(id){

  const base =
  location.origin +
  location.pathname;

  if(id){
    return base + "#video-" + encodeURIComponent(id);
  }

  return base;

}

function copyText(text){

  if(navigator.clipboard){
    navigator.clipboard.writeText(text)
    .then(function(){
      alert("リンクをコピーしました。");
    })
    .catch(function(){
      alert("コピーできませんでした。");
    });
    return;
  }

  alert(text);

}

document.addEventListener("click",function(e){

  const btn =
  e.target.closest(".copyBtn");

  if(!btn){
    return;
  }

  const title =
  btn.getAttribute("data-title") || "";

  const url =
  btn.getAttribute("data-url") || "";

  copyText(
    title + "\n" + url
  );

});

function videoCard(r,index){

  const videoUrl =
  findVideoUrl(r);

  const embedUrl =
  youtubeEmbed(videoUrl);

  if(!embedUrl){
    return "";
  }

  const id =
  r["ID"] ||
  "video-" + String(index + 1);

  const date =
  shortDate(
    r["日付"] ||
    r["日時"] ||
    ""
  );

  const theme =
  r["テーマ"] ||
  "";

  const title =
  r["タイトル"] ||
  "活動動画";

  const summary =
  r["概要"] ||
  "";

  const shareUrl =
  videoShareUrl(id);

  return ''
  + '<article class="videoCard" id="video-' + escAttr(id) + '">'
  + '<div class="videoFrame">'
  + '<iframe src="' + escAttr(embedUrl) + '" title="' + escAttr(title) + '" allowfullscreen loading="lazy"></iframe>'
  + '</div>'
  + '<div class="videoBody">'
  + '<div class="metaRow">'
  + (date ? '<span class="badge">📅 ' + esc(date) + '</span>' : '')
  + (theme ? '<span class="badge">📍 ' + esc(theme) + '</span>' : '')
  + '</div>'
  + '<h2 class="videoTitle">' + esc(title) + '</h2>'
  + (summary ? '<div class="videoSummary">' + esc(summary) + '</div>' : '')
  + '<div class="videoButtons">'
  + '<a class="primary" href="' + escAttr(videoUrl) + '" target="_blank" rel="noopener">YouTubeで見る</a>'
  + '<button class="copyBtn" type="button" data-title="' + escAttr(title) + '" data-url="' + escAttr(shareUrl) + '">リンクをコピー</button>'
  + '</div>'
  + '</div>'
  + '</article>';

}

function loadVideos(){

  videoList.innerHTML =
  '<div class="empty"><h3>動画を読み込み中です。</h3><p>少しお待ちください。</p></div>';

  const url =
  GAS_URL +
  "?mode=getActivities&t=" +
  Date.now();

  fetch(url)
  .then(function(res){
    return res.json();
  })
  .then(function(data){

    const records =
    data && data.records
    ? data.records
    : [];

    const html =
    records
    .map(videoCard)
    .filter(function(v){
      return v;
    })
    .join("");

    if(!html){
      videoList.innerHTML =
      '<div class="empty"><h3>現在、公開中の動画は準備中です。</h3><p>動画が公開されると、このページに表示されます。</p></div>';
      return;
    }

    videoList.innerHTML =
    html;

  })
  .catch(function(){

    videoList.innerHTML =
    '<div class="empty"><h3>動画を読み込めませんでした。</h3><p>時間をおいて、もう一度開いてください。</p></div>';

  });

}

loadVideos();
</script>

</body>
</html>
