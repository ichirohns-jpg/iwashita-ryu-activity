
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>動画で見る活動｜岩下りゅう 活動報告</title>

<meta name="theme-color" content="#6fbd69">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>

*{
 box-sizing:border-box;
}

html{
 scroll-behavior:smooth;
}

body{
 margin:0;
 font-family:
 "Hiragino Sans",
 "Yu Gothic",
 "Meiryo",
 sans-serif;
 background:
 radial-gradient(circle at 10% 0%,rgba(218,255,209,.95),transparent 30%),
 radial-gradient(circle at 90% 5%,rgba(255,246,176,.55),transparent 26%),
 linear-gradient(180deg,#f8fff5 0%,#ffffff 52%,#edfbea 100%);
 color:#203326;
 line-height:1.7;
 -webkit-text-size-adjust:100%;
}

a{
 color:inherit;
 text-decoration:none;
}

button{
 font-family:inherit;
 cursor:pointer;
}

.wrap{
 width:min(980px,94%);
 margin:auto;
 padding:12px 0 96px;
}

.header{
 position:sticky;
 top:0;
 z-index:90;
 display:flex;
 align-items:center;
 justify-content:space-between;
 gap:12px;
 padding:10px 0;
 background:rgba(248,255,245,.96);
 backdrop-filter:blur(16px);
}

.brand{
 display:flex;
 align-items:center;
 gap:10px;
 color:#1f5f35;
 font-weight:900;
}

.brand img{
 width:44px;
 height:44px;
 border-radius:16px;
 object-fit:cover;
 box-shadow:0 8px 22px rgba(70,130,82,.18);
}

.brand span{
 font-size:18px;
 line-height:1.25;
}

.headerNav{
 display:flex;
 flex-wrap:wrap;
 gap:7px;
}

.headerNav a{
 padding:9px 13px;
 border-radius:999px;
 background:#fff;
 border:1px solid #b7ebc0;
 color:#1f6b3d;
 font-size:13px;
 font-weight:900;
 box-shadow:0 6px 16px rgba(70,130,82,.07);
}

.hero{
 margin-top:8px;
 border-radius:34px;
 background:
 radial-gradient(circle at 100% 0%,rgba(255,246,176,.58),transparent 34%),
 linear-gradient(135deg,#ffffff 0%,#f4fff1 100%);
 border:2px solid #b7ebc0;
 box-shadow:0 16px 40px rgba(70,130,82,.12);
 padding:24px;
}

.kicker{
 display:inline-flex;
 padding:8px 13px;
 border-radius:999px;
 background:#e6ffe9;
 border:1px solid #b7ebc0;
 color:#1f6b3d;
 font-size:14px;
 font-weight:900;
}

.hero h1{
 margin:14px 0 0;
 color:#1f5f35;
 font-size:clamp(44px,11vw,74px);
 line-height:1.08;
 font-weight:900;
}

.hero p{
 margin:12px 0 0;
 color:#344c39;
 font-size:18px;
 line-height:1.75;
 font-weight:850;
}

.listSection{
 margin-top:30px;
}

.listHead{
 display:flex;
 align-items:flex-end;
 justify-content:space-between;
 gap:12px;
 margin-bottom:14px;
}

.listHead h2{
 margin:0;
 color:#1f5f35;
 font-size:clamp(34px,8vw,54px);
 line-height:1.15;
 font-weight:900;
}

.reloadBtn{
 border-radius:999px;
 background:#fff;
 border:2px solid #b7ebc0;
 color:#1f5f35;
 font-size:15px;
 font-weight:900;
 padding:10px 14px;
}

.videoList{
 display:grid;
 grid-template-columns:1fr;
 gap:18px;
}

.videoCard{
 overflow:hidden;
 border-radius:32px;
 background:#fff;
 border:2px solid #b7ebc0;
 box-shadow:0 16px 40px rgba(70,130,82,.11);
}

.videoBox{
 width:100%;
 aspect-ratio:16/9;
 background:#e6ffe9;
 border-bottom:1px solid #d6f3d8;
 overflow:hidden;
}

.videoBox iframe{
 display:block;
 width:100%;
 height:100%;
 border:0;
 background:#000;
}

.thumbLink{
 display:block;
 width:100%;
 height:100%;
 position:relative;
 background:
 radial-gradient(circle at 100% 0%,rgba(255,246,176,.35),transparent 35%),
 linear-gradient(135deg,#f3fff0 0%,#e6ffe9 100%);
}

.thumbLink img{
 display:block;
 width:100%;
 height:100%;
 object-fit:cover;
}

.playMark{
 position:absolute;
 left:50%;
 top:50%;
 transform:translate(-50%,-50%);
 width:78px;
 height:78px;
 border-radius:999px;
 background:rgba(255,255,255,.92);
 color:#1f5f35;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:34px;
 font-weight:900;
 box-shadow:0 10px 28px rgba(0,0,0,.22);
}

.videoBody{
 padding:20px;
}

.metaRow{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 margin-bottom:12px;
}

.badge{
 display:inline-flex;
 align-items:center;
 padding:6px 11px;
 border-radius:999px;
 background:#e6ffe9;
 border:1px solid #b7ebc0;
 color:#1f6b3d;
 font-size:13px;
 font-weight:900;
}

.videoTitle{
 margin:0;
 color:#1f5f35;
 font-size:clamp(30px,7vw,48px);
 line-height:1.2;
 font-weight:900;
}

.videoSummary{
 margin-top:12px;
 color:#2f4c36;
 font-size:18px;
 line-height:1.7;
 font-weight:850;
 white-space:pre-wrap;
 word-break:break-word;
}

.videoButtons{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-top:18px;
}

.videoButtons a,
.videoButtons button{
 min-height:56px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:20px;
 background:#fff;
 border:2px solid #b7ebc0;
 color:#1f5f35;
 font-size:16px;
 font-weight:900;
}

.videoButtons a.main{
 background:linear-gradient(135deg,#4caf63 0%,#78c96f 100%);
 border-color:#78c96f;
 color:#fff;
}

.shareBox{
 margin-top:18px;
 border-radius:24px;
 background:#f7fff5;
 border:1px solid #c8f0ce;
 padding:14px;
}

.shareTitle{
 color:#1f5f35;
 font-size:16px;
 font-weight:900;
 margin-bottom:10px;
}

.shareButtons{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
}

.shareButtons a,
.shareButtons button{
 min-height:50px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:18px;
 border:2px solid #b7ebc0;
 background:#fff;
 color:#1f5f35;
 font-size:15px;
 font-weight:900;
}

.empty{
 border-radius:28px;
 background:#fff;
 border:2px solid #b7ebc0;
 box-shadow:0 12px 30px rgba(71,130,82,.10);
 padding:22px;
 color:#4d6b55;
}

.empty h3{
 margin:0;
 color:#1f5f35;
 font-size:26px;
 line-height:1.3;
 font-weight:900;
}

.empty p{
 margin:10px 0 0;
 font-size:18px;
 line-height:1.7;
 font-weight:850;
}

.nextAction{
 margin-top:22px;
 border-radius:30px;
 background:#fff;
 border:1px solid #b7ebc0;
 box-shadow:0 12px 30px rgba(71,130,82,.10);
 padding:22px;
}

.nextAction h2{
 margin:0;
 color:#1f5f35;
 font-size:28px;
 line-height:1.25;
 font-weight:900;
}

.nextAction p{
 margin:8px 0 0;
 color:#4d6b55;
 font-size:16px;
 font-weight:850;
}

.nextButtons{
 display:grid;
 grid-template-columns:1fr;
 gap:10px;
 margin-top:14px;
}

.nextButtons a{
 min-height:62px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:24px;
 background:#fff;
 border:2px solid #b7ebc0;
 color:#1f5f35;
 font-size:20px;
 font-weight:900;
}

.nextButtons a.support{
 background:linear-gradient(135deg,#fff7c2 0%,#facc15 100%);
 border-color:#facc15;
 color:#5c3b00;
}

.bottomNav{
 position:fixed;
 left:0;
 right:0;
 bottom:0;
 z-index:100;
 display:grid;
 grid-template-columns:repeat(5,1fr);
 background:rgba(255,255,255,.98);
 border-top:1px solid #b7ebc0;
 box-shadow:0 -12px 30px rgba(71,130,82,.12);
 backdrop-filter:blur(14px);
}

.bottomNav a{
 text-align:center;
 color:#1f6b3d;
 padding:8px 4px 7px;
 font-size:12px;
 font-weight:900;
}

.bottomNav a span{
 display:block;
 font-size:22px;
 line-height:1.1;
}

.bottomNav a.active{
 background:#e2f8e5;
 color:#14532d;
}

.footer{
 margin-top:30px;
 text-align:center;
 color:#4d6b55;
 font-size:13px;
 font-weight:800;
}

@media (min-width:820px){

 .videoList{
  grid-template-columns:repeat(2,1fr);
 }

 .videoCard:first-child{
  grid-column:1 / -1;
 }

 .nextButtons{
  grid-template-columns:1fr 1fr;
 }

}

@media (max-width:560px){

 .wrap{
  width:94%;
 }

 .headerNav{
  display:none;
 }

 .brand span{
  font-size:16px;
 }

 .hero{
  border-radius:28px;
  padding:18px;
 }

 .listHead{
  align-items:flex-start;
  flex-direction:column;
 }

 .videoBody{
  padding:18px;
 }

 .shareButtons{
  grid-template-columns:1fr 1fr;
 }

 .videoButtons{
  grid-template-columns:1fr;
 }

}

</style>

</head>

<body>

<div class="wrap">

<header class="header">

 <a class="brand" href="index.html">
  <img src="apple-touch-icon.png" alt="岩下りゅう">
  <span>岩下りゅう 活動報告</span>
 </a>

 <nav class="headerNav">
  <a href="index.html">トップ</a>
  <a href="activity.html">活動</a>

  <a href="support.html">応援</a>
  <a href="profile.html">人物</a>
 </nav>

</header>

<main>

<section class="hero">

 <div class="kicker">動画で見る活動</div>

 <h1>動画</h1>

 <p>
  地域での活動やメッセージを、動画でわかりやすく紹介します。
 </p>

</section>

<section class="listSection">

 <div class="listHead">

  <h2>公開中の動画</h2>

  <button class="reloadBtn" type="button" onclick="loadVideos()">更新</button>

 </div>

 <div id="videoList" class="videoList">

  <div class="empty">
   <h3>動画を読み込み中です。</h3>
   <p>少しお待ちください。</p>
  </div>

 </div>

</section>

<section class="nextAction">

 <h2>動画を見たあとは</h2>

 <p>
  写真つきの活動報告や、応援メッセージもご覧いただけます。
 </p>

 <div class="nextButtons">
  <a href="activity.html">活動を見る</a>
  <a class="support" href="support.html">応援メッセージを書く</a>
 </div>

</section>

</main>

<footer class="footer">
 岩下りゅう 活動報告<br>
 地域での活動を、写真と動画でわかりやすく。
</footer>

</div>

<nav class="bottomNav">
 <a href="index.html"><span>🏠</span>トップ</a>
 <a href="activity.html"><span>📸</span>活動</a>
 <a href="videos.html" class="active"><span>🎥</span>動画</a>
 <a href="support.html"><span>💬</span>応援</a>
 <a href="profile.html"><span>👤</span>人物</a>
</nav>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbwnHzGW_dHBNISyJzW_zFGX2rhMwX_g2SzENuW58SZNrKVKv6gMkHeU2P83BQbHrcqneA/exec";

const videoList =
document.getElementById("videoList");

function esc(v){

 return String(v || "")
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;")
 .replace(/'/g,"&#39;");

}

function pick(obj,keys,defaultValue){

 for(let i = 0; i < keys.length; i++){

  const key =
  keys[i];

  if(
   obj &&
   obj[key] !== undefined &&
   obj[key] !== null &&
   String(obj[key]).trim() !== ""
  ){

   return String(obj[key]).trim();

  }

 }

 return defaultValue || "";

}

function shortDate(v){

 const s =
 String(v || "");

 if(!s){
  return "";
 }

 return s
 .replace(/\s\d{2}:\d{2}.*/,"")
 .replace(/-/g,"/");

}

function getYouTubeId(url){

 const text =
 String(url || "").trim();

 if(!text){
  return "";
 }

 let match =
 text.match(/youtu\.be\/([^?&/]+)/);

 if(match && match[1]){
  return match[1];
 }

 match =
 text.match(/[?&]v=([^?&]+)/);

 if(match && match[1]){
  return match[1];
 }

 match =
 text.match(/\/embed\/([^?&/]+)/);

 if(match && match[1]){
  return match[1];
 }

 match =
 text.match(/\/shorts\/([^?&/]+)/);

 if(match && match[1]){
  return match[1];
 }

 return "";

}

function makeEmbedUrl(rawUrl,embedUrl){

 const ready =
 String(embedUrl || "").trim();

 if(ready){

  if(ready.indexOf("youtube.com/embed/") !== -1){
   return ready;
  }

  const readyId =
  getYouTubeId(ready);

  if(readyId){
   return "https://www.youtube.com/embed/" + readyId;
  }

  return ready;

 }

 const id =
 getYouTubeId(rawUrl);

 if(id){
  return "https://www.youtube.com/embed/" + id;
 }

 return "";

}

function makeThumbUrl(rawUrl,thumbUrl){

 const ready =
 String(thumbUrl || "").trim();

 if(ready){
  return ready;
 }

 const id =
 getYouTubeId(rawUrl);

 if(id){
  return "https://img.youtube.com/vi/" + id + "/hqdefault.jpg";
 }

 return "";

}

function videoShareUrl(id){

 const base =
 location.origin +
 location.pathname;

 if(id){
  return base + "#video-" + encodeURIComponent(id);
 }

 return base;

}

function makeShareText(title,summary){

 const text =
 (title || "岩下りゅう 動画") +
 "\n" +
 (summary || "");

 return text.trim();

}

function copyVideo(title,url){

 const text =
 title + "\n" + url;

 if(navigator.clipboard){

  navigator.clipboard.writeText(text)
  .then(function(){
   alert("リンクをコピーしました。");
  })
  .catch(function(){
   alert("コピーできませんでした。");
  });

  return;

 }

 alert(url);

}

function normalizeVideos(data){

 if(Array.isArray(data)){
  return data;
 }

 if(data && Array.isArray(data.records)){
  return data.records;
 }

 if(data && Array.isArray(data.videos)){
  return data.videos;
 }

 if(data && Array.isArray(data.data)){
  return data.data;
 }

 if(data && Array.isArray(data.items)){
  return data.items;
 }

 return [];

}

function videoCard(r,index){

 const id =
 pick(r,[
  "ID",
  "id",
  "videoId"
 ],String(index + 1));

 const date =
 shortDate(
  pick(r,[
   "日付",
   "日時",
   "date",
   "createdAt"
  ],"")
 );

 const theme =
 pick(r,[
  "テーマ",
  "分類",
  "theme",
  "category"
 ],"");

 const title =
 pick(r,[
  "タイトル",
  "title",
  "動画タイトル"
 ],"動画");

 const summary =
 pick(r,[
  "概要",
  "説明",
  "本文",
  "summary",
  "description",
  "body"
 ],"");

 const rawUrl =
 pick(r,[
  "YouTubeURL",
  "YouTube",
  "動画URL",
  "videoUrl",
  "youtubeUrl",
  "url"
 ],"");

 const embedFromSheet =
 pick(r,[
  "埋め込みURL",
  "embedUrl",
  "iframeUrl"
 ],"");

 const thumbnailFromSheet =
 pick(r,[
  "サムネイルURL",
  "画像URL",
  "thumbnailUrl",
  "thumbUrl",
  "imageUrl"
 ],"");

 const embedUrl =
 makeEmbedUrl(
  rawUrl,
  embedFromSheet
 );

 const thumbUrl =
 makeThumbUrl(
  rawUrl,
  thumbnailFromSheet
 );

 const shareUrl =
 videoShareUrl(id);

 const shareText =
 makeShareText(
  title,
  summary
 );

 const lineUrl =
 "https://social-plugins.line.me/lineit/share?url=" +
 encodeURIComponent(shareUrl);

 const xUrl =
 "https://twitter.com/intent/tweet?text=" +
 encodeURIComponent(shareText) +
 "&url=" +
 encodeURIComponent(shareUrl);

 const fbUrl =
 "https://www.facebook.com/sharer/sharer.php?u=" +
 encodeURIComponent(shareUrl);

 let videoHtml =
 "";

 if(embedUrl){

  videoHtml =
  '<div class="videoBox">' +
  '<iframe src="' + esc(embedUrl) + '" title="' + esc(title) + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>' +
  '</div>';

 }else if(rawUrl && thumbUrl){

  videoHtml =
  '<div class="videoBox">' +
  '<a class="thumbLink" href="' + esc(rawUrl) + '" target="_blank" rel="noopener">' +
  '<img src="' + esc(thumbUrl) + '" alt="' + esc(title) + '">' +
  '<div class="playMark">▶</div>' +
  '</a>' +
  '</div>';

 }else if(rawUrl){

  videoHtml =
  '<div class="videoBox">' +
  '<a class="thumbLink" href="' + esc(rawUrl) + '" target="_blank" rel="noopener">' +
  '<div class="playMark">▶</div>' +
  '</a>' +
  '</div>';

 }else{

  videoHtml =
  '<div class="videoBox">' +
  '<div class="thumbLink">' +
  '<div class="playMark">🎥</div>' +
  '</div>' +
  '</div>';

 }

 return ''
 + '<article class="videoCard" id="video-' + esc(id) + '">'

 + videoHtml

 + '<div class="videoBody">'

 + '<div class="metaRow">'
 + (date ? '<span class="badge">📅 ' + esc(date) + '</span>' : '')
 + (theme ? '<span class="badge">🏷️ ' + esc(theme) + '</span>' : '')
 + '</div>'

 + '<h2 class="videoTitle">' + esc(title) + '</h2>'

 + (summary ? '<div class="videoSummary">' + esc(summary) + '</div>' : '')

 + '<div class="videoButtons">'
 + (rawUrl ? '<a class="main" href="' + esc(rawUrl) + '" target="_blank" rel="noopener">動画を開く</a>' : '<button type="button" disabled>動画URLなし</button>')
 + '<a href="activity.html">活動報告を見る</a>'
 + '</div>'

 + '<div class="shareBox">'
 + '<div class="shareTitle">この動画を共有する</div>'
 + '<div class="shareButtons">'
 + '<a href="' + esc(lineUrl) + '" target="_blank" rel="noopener">LINE</a>'
 + '<a href="' + esc(xUrl) + '" target="_blank" rel="noopener">X</a>'
 + '<a href="' + esc(fbUrl) + '" target="_blank" rel="noopener">Facebook</a>'
 + '<button type="button" onclick="copyVideo(' + JSON.stringify(title) + ',' + JSON.stringify(shareUrl) + ')">コピー</button>'
 + '</div>'
 + '</div>'

 + '</div>'

 + '</article>';

}

function renderVideos(data){

 const records =
 normalizeVideos(data);

 if(!records.length){

  videoList.innerHTML =
  '<div class="empty">' +
  '<h3>現在、公開中の動画は準備中です。</h3>' +
  '<p>公開された動画は、このページに順番に表示されます。</p>' +
  '</div>';

  return;

 }

 videoList.innerHTML =
 records
 .map(function(r,index){
  return videoCard(r,index);
 })
 .join("");

}

function loadVideos(){

 videoList.innerHTML =
 '<div class="empty">' +
 '<h3>動画を読み込み中です。</h3>' +
 '<p>少しお待ちください。</p>' +
 '</div>';

 const url =
 GAS_URL +
 "?mode=getVideos&t=" +
 Date.now();

 fetch(url)
 .then(function(res){
  return res.json();
 })
 .then(function(data){
  renderVideos(data);
 })
 .catch(function(){

  videoList.innerHTML =
  '<div class="empty">' +
  '<h3>動画を読み込めませんでした。</h3>' +
  '<p>GAS URL、デプロイ、アクセス権限を確認してください。</p>' +
  '</div>';

 });

}

loadVideos();

</script>

</body>
</html>
