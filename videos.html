<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>動画で見る活動｜岩下りゅう 活動報告</title>

<meta name="description" content="岩下りゅうの地域活動やメッセージを動画でわかりやすく紹介します。">
<meta name="theme-color" content="#237a3b">

<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>

:root{
 --kappa-dark:#14532d;
 --kappa-main:#237a3b;
 --kappa-mid:#4caf63;
 --kappa-light:#7bcf7a;
 --shinryoku:#e8f8e8;
 --shinryoku-soft:#f7fff4;
 --river-blue:#e0f2fe;
 --cream:#fff7c2;
 --gold:#facc15;
 --ink:#1f2933;
 --muted:#4b6350;
 --line:#9ed7aa;
 --white:#ffffff;
}

*{
 box-sizing:border-box;
}

html{
 scroll-behavior:smooth;
}

body{
 margin:0;
 font-family:
 "Hiragino Sans",
 "Yu Gothic",
 "Meiryo",
 sans-serif;
 background:
 radial-gradient(circle at 8% 0%,rgba(190,240,185,.70),transparent 28%),
 radial-gradient(circle at 92% 4%,rgba(224,242,254,.78),transparent 30%),
 linear-gradient(180deg,#f7fff4 0%,#ffffff 50%,#eef9ee 100%);
 color:var(--ink);
 line-height:1.7;
 -webkit-text-size-adjust:100%;
}

a{
 color:inherit;
 text-decoration:none;
}

button{
 font-family:inherit;
 cursor:pointer;
}

.wrap{
 width:min(980px,94%);
 margin:auto;
 padding:12px 0 96px;
}

.header{
 position:sticky;
 top:0;
 z-index:80;
 display:flex;
 align-items:center;
 justify-content:space-between;
 gap:12px;
 padding:10px 0;
 background:rgba(247,255,244,.96);
 backdrop-filter:blur(14px);
}

.brand{
 display:flex;
 align-items:center;
 gap:10px;
 color:var(--kappa-dark);
 font-weight:900;
}

.brand img{
 width:44px;
 height:44px;
 border-radius:14px;
 object-fit:cover;
 box-shadow:0 6px 18px rgba(20,83,45,.18);
}

.brand span{
 font-size:18px;
 line-height:1.25;
}

.headerNav{
 display:flex;
 flex-wrap:wrap;
 gap:7px;
}

.headerNav a{
 padding:9px 13px;
 border-radius:999px;
 background:#fff;
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:13px;
 font-weight:900;
 box-shadow:0 6px 16px rgba(20,83,45,.07);
}

.hero{
 margin-top:8px;
 border-radius:28px;
 background:
 radial-gradient(circle at 100% 0%,rgba(255,247,194,.70),transparent 34%),
 radial-gradient(circle at 0% 100%,rgba(224,242,254,.60),transparent 34%),
 linear-gradient(135deg,#ffffff 0%,#f3fff1 100%);
 border:2px solid var(--line);
 box-shadow:0 12px 30px rgba(20,83,45,.10);
 padding:22px;
}

.kicker{
 display:inline-flex;
 padding:7px 12px;
 border-radius:999px;
 background:var(--shinryoku);
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:14px;
 font-weight:900;
}

.hero h1{
 margin:12px 0 0;
 color:var(--kappa-dark);
 font-size:clamp(34px,8vw,56px);
 line-height:1.12;
 font-weight:900;
}

.hero p{
 margin:10px 0 0;
 color:var(--ink);
 font-size:18px;
 line-height:1.75;
 font-weight:850;
}

.heroButtons{
 margin-top:16px;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.heroButtons a{
 min-height:58px;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 border-radius:22px;
 background:#fff;
 border:2px solid var(--line);
 color:var(--kappa-dark);
 font-size:18px;
 font-weight:900;
 padding:10px;
}

.heroButtons a.primary{
 background:linear-gradient(135deg,#14532d 0%,#237a3b 55%,#4caf63 100%);
 border-color:var(--kappa-main);
 color:#fff;
 box-shadow:0 12px 26px rgba(20,83,45,.22);
}

.listSection{
 margin-top:28px;
}

.listHead{
 display:flex;
 align-items:flex-end;
 justify-content:space-between;
 gap:12px;
 margin-bottom:14px;
}

.listHead h2{
 margin:0;
 color:var(--kappa-dark);
 font-size:clamp(30px,7vw,46px);
 line-height:1.18;
 font-weight:900;
}

.listHead p{
 margin:5px 0 0;
 color:var(--ink);
 font-size:16px;
 font-weight:850;
}

.reloadBtn{
 border-radius:999px;
 background:#fff;
 border:2px solid var(--line);
 color:var(--kappa-dark);
 font-size:15px;
 font-weight:900;
 padding:10px 14px;
}

.videoList{
 display:grid;
 grid-template-columns:1fr;
 gap:18px;
}

.videoCard{
 overflow:hidden;
 border-radius:28px;
 background:#fff;
 border:2px solid var(--line);
 box-shadow:0 12px 30px rgba(20,83,45,.10);
}

.videoBox{
 width:100%;
 aspect-ratio:16/9;
 background:
 radial-gradient(circle at 100% 0%,rgba(224,242,254,.70),transparent 35%),
 linear-gradient(135deg,#f5fff3 0%,#e8f8e8 100%);
 border-bottom:1px solid #d6f3d8;
 overflow:hidden;
}

.videoBox iframe{
 display:block;
 width:100%;
 height:100%;
 border:0;
 background:#000;
}

.thumbLink{
 width:100%;
 height:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 position:relative;
 background:
 radial-gradient(circle at 100% 0%,rgba(224,242,254,.70),transparent 35%),
 linear-gradient(135deg,#f5fff3 0%,#e8f8e8 100%);
}

.thumbLink img{
 width:100%;
 height:100%;
 object-fit:cover;
 display:block;
}

.playMark{
 position:absolute;
 left:50%;
 top:50%;
 transform:translate(-50%,-50%);
 width:74px;
 height:74px;
 border-radius:999px;
 background:rgba(255,255,255,.92);
 color:var(--kappa-dark);
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:32px;
 font-weight:900;
 box-shadow:0 10px 26px rgba(0,0,0,.20);
}

.noVideo{
 color:var(--muted);
 font-size:20px;
 font-weight:900;
}

.videoBody{
 padding:18px;
}

.metaRow{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 margin-bottom:12px;
}

.badge{
 display:inline-flex;
 align-items:center;
 padding:6px 11px;
 border-radius:999px;
 background:var(--shinryoku);
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:13px;
 font-weight:900;
}

.videoTitle{
 margin:0;
 color:var(--kappa-dark);
 font-size:clamp(26px,6vw,40px);
 line-height:1.25;
 font-weight:900;
}

.videoSummary{
 margin-top:12px;
 color:var(--ink);
 font-size:18px;
 line-height:1.75;
 font-weight:850;
 white-space:pre-wrap;
 word-break:break-word;
}

.videoButtons{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-top:16px;
}

.videoButtons a,
.videoButtons button{
 min-height:54px;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 border-radius:19px;
 background:#fff;
 border:2px solid var(--line);
 color:var(--kappa-dark);
 font-size:16px;
 font-weight:900;
}

.videoButtons a.main{
 background:linear-gradient(135deg,#14532d 0%,#237a3b 55%,#4caf63 100%);
 border-color:var(--kappa-main);
 color:#fff;
}

.videoButtons button[disabled]{
 opacity:.45;
}

.shareBox{
 margin-top:16px;
 border-radius:22px;
 background:#f7fff5;
 border:1px solid #c8f0ce;
 padding:14px;
}

.shareTitle{
 color:var(--kappa-dark);
 font-size:16px;
 font-weight:900;
 margin-bottom:10px;
}

.shareButtons{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
}

.shareButtons a,
.shareButtons button{
 min-height:48px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:17px;
 border:2px solid var(--line);
 background:#fff;
 color:var(--kappa-dark);
 font-size:15px;
 font-weight:900;
}

.nextAction{
 margin-top:22px;
 border-radius:28px;
 background:#fff;
 border:2px solid var(--line);
 box-shadow:0 12px 30px rgba(20,83,45,.10);
 padding:20px;
}

.nextAction h2{
 margin:0;
 color:var(--kappa-dark);
 font-size:28px;
 line-height:1.25;
 font-weight:900;
}

.nextAction p{
 margin:8px 0 0;
 color:var(--ink);
 font-size:16px;
 font-weight:850;
}

.nextButtons{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-top:14px;
}

.nextButtons a{
 min-height:60px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:22px;
 background:#fff;
 border:2px solid var(--line);
 color:var(--kappa-dark);
 font-size:18px;
 font-weight:900;
}

.nextButtons a.support{
 background:var(--cream);
 border-color:var(--gold);
 color:#5c3b00;
}

.empty{
 border-radius:26px;
 background:#fff;
 border:2px solid var(--line);
 box-shadow:0 10px 26px rgba(20,83,45,.10);
 padding:22px;
 color:var(--muted);
}

.empty h3{
 margin:0;
 color:var(--kappa-dark);
 font-size:25px;
 line-height:1.3;
 font-weight:900;
}

.empty p{
 margin:10px 0 0;
 color:var(--ink);
 font-size:17px;
 line-height:1.7;
 font-weight:850;
}

.footer{
 margin-top:30px;
 text-align:center;
 color:var(--ink);
 font-size:13px;
 font-weight:800;
}

.bottomNav{
 position:fixed;
 left:0;
 right:0;
 bottom:0;
 z-index:100;
 display:grid;
 grid-template-columns:repeat(5,1fr);
 background:rgba(255,255,255,.98);
 border-top:1px solid var(--line);
 box-shadow:0 -12px 30px rgba(20,83,45,.12);
 backdrop-filter:blur(14px);
}

.bottomNav a{
 text-align:center;
 color:var(--kappa-dark);
 padding:8px 4px 7px;
 font-size:12px;
 font-weight:900;
}

.bottomNav a span{
 display:block;
 font-size:22px;
 line-height:1.1;
}

.bottomNav a.active{
 background:#e2f8e5;
 color:#14532d;
}

@media (min-width:820px){

 .videoList{
  grid-template-columns:repeat(2,1fr);
 }

 .videoCard:first-child{
  grid-column:1 / -1;
 }

}

@media (max-width:700px){

 .wrap{
  width:94%;
 }

 .headerNav{
  display:none;
 }

 .brand span{
  font-size:16px;
 }

 .hero{
  border-radius:26px;
  padding:18px;
 }

 .heroButtons,
 .nextButtons{
  grid-template-columns:1fr;
 }

 .listHead{
  align-items:flex-start;
  flex-direction:column;
 }

 .videoBody{
  padding:17px;
 }

 .shareButtons{
  grid-template-columns:1fr 1fr;
 }

 .videoButtons{
  grid-template-columns:1fr;
 }

}

</style>
</head>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxaTX14m9ftBS_Udl8w-HCHXSulvFcV9VJ9ANGM6FwCx0ejCLXaY0MhdbdexXBHkSmxJg/exec";

const videoList =
document.getElementById("videoList");

function esc(v){

 return String(v || "")
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;")
 .replace(/'/g,"&#39;");

}

function pick(obj,keys,defaultValue){

 for(let i = 0; i < keys.length; i++){

  const key =
  keys[i];

  if(
   obj &&
   obj[key] !== undefined &&
   obj[key] !== null &&
   String(obj[key]).trim() !== ""
  ){

   return String(obj[key]).trim();

  }

 }

 return defaultValue || "";

}

function normalizeVideos(data){

 if(Array.isArray(data)){
  return data;
 }

 if(data && Array.isArray(data.records)){
  return data.records;
 }

 if(data && Array.isArray(data.videos)){
  return data.videos;
 }

 if(data && Array.isArray(data.data)){
  return data.data;
 }

 if(data && Array.isArray(data.items)){
  return data.items;
 }

 return [];

}

function shortDate(v){

 const s =
 String(v || "");

 if(!s){
  return "";
 }

 return s
 .replace(/\s\d{2}:\d{2}.*/,"")
 .replace(/-/g,"/");

}

function getYouTubeId(url){

 const text =
 String(url || "").trim();

 if(!text){
  return "";
 }

 let match =
 text.match(/youtu\.be\/([^?&/]+)/);

 if(match && match[1]){
  return match[1];
 }

 match =
 text.match(/[?&]v=([^?&]+)/);

 if(match && match[1]){
  return match[1];
 }

 match =
 text.match(/\/embed\/([^?&/]+)/);

 if(match && match[1]){
  return match[1];
 }

 match =
 text.match(/\/shorts\/([^?&/]+)/);

 if(match && match[1]){
  return match[1];
 }

 return "";

}

function makeEmbedUrl(rawUrl,embedUrl){

 const ready =
 String(embedUrl || "").trim();

 if(ready){

  if(ready.indexOf("youtube.com/embed/") !== -1){
   return ready;
  }

  const readyId =
  getYouTubeId(ready);

  if(readyId){
   return "https://www.youtube.com/embed/" + readyId;
  }

  return ready;

 }

 const id =
 getYouTubeId(rawUrl);

 if(id){
  return "https://www.youtube.com/embed/" + id;
 }

 return "";

}

function makeThumbUrl(rawUrl,thumbUrl){

 const ready =
 String(thumbUrl || "").trim();

 if(ready){
  return ready;
 }

 const id =
 getYouTubeId(rawUrl);

 if(id){
  return "https://img.youtube.com/vi/" + id + "/hqdefault.jpg";
 }

 return "";

}

function videoShareUrl(id){

 const base =
 location.origin +
 location.pathname;

 if(id){
  return base + "#video-" + encodeURIComponent(id);
 }

 return base;

}

function makeShareText(title,summary){

 return (
  String(title || "岩下りゅう 動画") +
  "\n" +
  String(summary || "")
 ).trim();

}

function copyVideo(title,url){

 const text =
 title + "\n" + url;

 if(navigator.clipboard){

  navigator.clipboard.writeText(text)
  .then(function(){
   alert("リンクをコピーしました。");
  })
  .catch(function(){
   alert("コピーできませんでした。");
  });

  return;

 }

 alert(url);

}

function videoCard(r,index){

 const id =
 pick(r,[
  "ID",
  "id",
  "videoId"
 ],String(index + 1));

 const date =
 shortDate(
  pick(r,[
   "日付",
   "日時",
   "date",
   "createdAt"
  ],"")
 );

 const theme =
 pick(r,[
  "テーマ",
  "分類",
  "theme",
  "category"
 ],"");

 const title =
 pick(r,[
  "タイトル",
  "title",
  "動画タイトル"
 ],"動画");

 const summary =
 pick(r,[
  "概要",
  "説明",
  "本文",
  "summary",
  "description",
  "body"
 ],"");

 const rawUrl =
 pick(r,[
  "YouTubeURL",
  "YouTube",
  "動画URL",
  "videoUrl",
  "youtubeUrl",
  "url"
 ],"");

 const embedFromSheet =
 pick(r,[
  "埋め込みURL",
  "embedUrl",
  "iframeUrl"
 ],"");

 const thumbnailFromSheet =
 pick(r,[
  "サムネイルURL",
  "画像URL",
  "thumbnailUrl",
  "thumbUrl",
  "imageUrl"
 ],"");

 const embedUrl =
 makeEmbedUrl(
  rawUrl,
  embedFromSheet
 );

 const thumbUrl =
 makeThumbUrl(
  rawUrl,
  thumbnailFromSheet
 );

 const shareUrl =
 videoShareUrl(id);

 const shareText =
 makeShareText(
  title,
  summary
 );

 const lineUrl =
 "https://social-plugins.line.me/lineit/share?url=" +
 encodeURIComponent(shareUrl);

 const xUrl =
 "https://twitter.com/intent/tweet?text=" +
 encodeURIComponent(shareText) +
 "&url=" +
 encodeURIComponent(shareUrl);

 const fbUrl =
 "https://www.facebook.com/sharer/sharer.php?u=" +
 encodeURIComponent(shareUrl);

 let videoHtml =
 "";

 if(embedUrl){

  videoHtml =
  '<div class="videoBox">' +
  '<iframe src="' + esc(embedUrl) + '" title="' + esc(title) + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>' +
  '</div>';

 }else if(rawUrl && thumbUrl){

  videoHtml =
  '<div class="videoBox">' +
  '<a class="thumbLink" href="' + esc(rawUrl) + '" target="_blank" rel="noopener">' +
  '<img src="' + esc(thumbUrl) + '" alt="' + esc(title) + '">' +
  '<div class="playMark">▶</div>' +
  '</a>' +
  '</div>';

 }else if(rawUrl){

  videoHtml =
  '<div class="videoBox">' +
  '<a class="thumbLink" href="' + esc(rawUrl) + '" target="_blank" rel="noopener">' +
  '<div class="playMark">▶</div>' +
  '</a>' +
  '</div>';

 }else{

  videoHtml =
  '<div class="videoBox">' +
  '<div class="thumbLink">' +
  '<div class="noVideo">動画URLなし</div>' +
  '</div>' +
  '</div>';

 }

 return ''
 + '<article class="videoCard" id="video-' + esc(id) + '">'

 + videoHtml

 + '<div class="videoBody">'

 + '<div class="metaRow">'
 + (date ? '<span class="badge">📅 ' + esc(date) + '</span>' : '')
 + (theme ? '<span class="badge">🏷️ ' + esc(theme) + '</span>' : '')
 + '</div>'

 + '<h2 class="videoTitle">' + esc(title) + '</h2>'

 + (summary ? '<div class="videoSummary">' + esc(summary) + '</div>' : '')

 + '<div class="videoButtons">'
 + (rawUrl ? '<a class="main" href="' + esc(rawUrl) + '" target="_blank" rel="noopener">動画を開く</a>' : '<button type="button" disabled>動画URLなし</button>')
 + '<a href="activity.html">活動報告を見る</a>'
 + '</div>'

 + '<div class="shareBox">'
 + '<div class="shareTitle">この動画を共有する</div>'
 + '<div class="shareButtons">'
 + '<a href="' + esc(lineUrl) + '" target="_blank" rel="noopener">LINE</a>'
 + '<a href="' + esc(xUrl) + '" target="_blank" rel="noopener">X</a>'
 + '<a href="' + esc(fbUrl) + '" target="_blank" rel="noopener">Facebook</a>'
 + '<button type="button" onclick="copyVideo(' + JSON.stringify(title) + ',' + JSON.stringify(shareUrl) + ')">コピー</button>'
 + '</div>'
 + '</div>'

 + '</div>'

 + '</article>';

}

function renderVideos(data){

 const records =
 normalizeVideos(data);

 if(!records.length){

  videoList.innerHTML =
  '<div class="empty">' +
  '<h3>現在、公開中の動画は準備中です。</h3>' +
  '<p>公開された動画は、このページに順番に表示されます。</p>' +
  '</div>';

  return;

 }

 videoList.innerHTML =
 records
 .map(function(r,index){
  return videoCard(r,index);
 })
 .join("");

}

function loadVideos(){

 videoList.innerHTML =
 '<div class="empty">' +
 '<h3>動画を読み込み中です。</h3>' +
 '<p>少しお待ちください。</p>' +
 '</div>';

 const callbackName =
 "videosCallback_" +
 Date.now() +
 "_" +
 Math.floor(Math.random() * 100000);

 window[callbackName] =
 function(data){

  renderVideos(data);

  try{
   delete window[callbackName];
  }catch(e){
   window[callbackName] = undefined;
  }

  const old =
  document.getElementById(callbackName);

  if(old){
   old.remove();
  }

 };

 const script =
 document.createElement("script");

 script.id =
 callbackName;

 script.src =
 GAS_URL +
 "?mode=getVideos&callback=" +
 encodeURIComponent(callbackName) +
 "&t=" +
 Date.now();

 script.onerror =
 function(){

  videoList.innerHTML =
  '<div class="empty">' +
  '<h3>動画を読み込めませんでした。</h3>' +
  '<p>GAS URL、デプロイ、アクセス権限を確認してください。</p>' +
  '</div>';

  try{
   delete window[callbackName];
  }catch(e){
   window[callbackName] = undefined;
  }

 };

 document.body.appendChild(script);

}

loadVideos();

</script>

</body>
</html>
