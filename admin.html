<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>管理画面｜岩下りゅう 活動報告DX</title>

<meta name="description" content="岩下りゅう活動報告DXの管理画面です。">
<meta name="theme-color" content="#14532d">

<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>

:root{
 --kappa-dark:#14532d;
 --kappa-main:#237a3b;
 --kappa-mid:#4caf63;
 --shinryoku:#e8f8e8;
 --river-blue:#e0f2fe;
 --cream:#fff7c2;
 --gold:#facc15;
 --ink:#1f2933;
 --muted:#4b6350;
 --line:#9ed7aa;
 --white:#ffffff;
}

*{
 box-sizing:border-box;
}

body{
 margin:0;
 font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
 background:
 radial-gradient(circle at 8% 0%,rgba(190,240,185,.70),transparent 28%),
 radial-gradient(circle at 92% 4%,rgba(224,242,254,.78),transparent 30%),
 linear-gradient(180deg,#f7fff4 0%,#ffffff 50%,#eef9ee 100%);
 color:var(--ink);
 line-height:1.7;
 -webkit-text-size-adjust:100%;
}

a{
 color:inherit;
 text-decoration:none;
}

button,
input,
select,
textarea{
 font-family:inherit;
}

button{
 cursor:pointer;
}

.wrap{
 width:min(980px,94%);
 margin:auto;
 padding:14px 0 50px;
}

.header{
 display:flex;
 align-items:center;
 justify-content:space-between;
 gap:12px;
 position:sticky;
 top:0;
 z-index:50;
 background:rgba(247,255,244,.96);
 backdrop-filter:blur(14px);
 padding:10px 0;
}

.brand{
 display:flex;
 align-items:center;
 gap:10px;
 color:var(--kappa-dark);
 font-weight:900;
}

.brand img{
 width:44px;
 height:44px;
 border-radius:14px;
 object-fit:cover;
 box-shadow:0 6px 18px rgba(20,83,45,.18);
}

.brand span{
 font-size:18px;
 line-height:1.25;
}

.header a.homeLink{
 padding:9px 13px;
 border-radius:999px;
 background:#fff;
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:13px;
 font-weight:900;
}

.hero,
.loginCard,
.panel,
.reportCard{
 border-radius:28px;
 background:#fff;
 border:2px solid var(--line);
 box-shadow:0 12px 30px rgba(20,83,45,.10);
 padding:22px;
}

.hero{
 margin-top:10px;
 background:
 radial-gradient(circle at 100% 0%,rgba(255,247,194,.76),transparent 34%),
 radial-gradient(circle at 0% 100%,rgba(224,242,254,.65),transparent 34%),
 linear-gradient(135deg,#ffffff 0%,#f3fff1 100%);
}

.kicker{
 display:inline-flex;
 padding:7px 12px;
 border-radius:999px;
 background:var(--shinryoku);
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:14px;
 font-weight:900;
}

h1{
 margin:12px 0 0;
 color:var(--kappa-dark);
 font-size:clamp(34px,8vw,56px);
 line-height:1.1;
 font-weight:900;
}

.hero p,
.loginCard p,
.panel p{
 margin:8px 0 0;
 color:var(--ink);
 font-size:17px;
 font-weight:850;
}

.loginCard{
 margin-top:18px;
}

.loginCard h2,
.panel h2{
 margin:0;
 color:var(--kappa-dark);
 font-size:clamp(28px,7vw,42px);
 line-height:1.2;
 font-weight:900;
}

label{
 display:block;
 margin-top:16px;
 color:var(--kappa-dark);
 font-size:18px;
 font-weight:900;
}

.help{
 display:block;
 color:var(--muted);
 font-size:13px;
 font-weight:800;
 margin-top:3px;
}

input,
select,
textarea{
 width:100%;
 margin-top:8px;
 border:2px solid var(--line);
 border-radius:18px;
 background:#fffdf0;
 color:var(--ink);
 font-size:18px;
 font-weight:850;
 outline:none;
}

input,
select{
 min-height:56px;
 padding:0 14px;
}

textarea{
 min-height:130px;
 padding:14px;
 resize:vertical;
}

input:focus,
select:focus,
textarea:focus{
 border-color:var(--kappa-main);
 background:#fff;
 box-shadow:0 0 0 4px rgba(35,122,59,.15);
}

.btn{
 min-height:56px;
 border-radius:20px;
 border:2px solid var(--line);
 background:#fff;
 color:var(--kappa-dark);
 font-size:17px;
 font-weight:900;
 padding:10px 14px;
}

.btnGreen{
 border-color:var(--kappa-main);
 background:linear-gradient(135deg,#14532d 0%,#237a3b 55%,#4caf63 100%);
 color:#fff;
}

.btnYellow{
 border-color:var(--gold);
 background:var(--cream);
 color:#5c3b00;
}

.btnDanger{
 border-color:#fca5a5;
 background:#fee2e2;
 color:#7f1d1d;
}

.loginButton{
 width:100%;
 margin-top:18px;
 min-height:68px;
 font-size:22px;
}

.status{
 display:none;
 margin-top:14px;
 border-radius:20px;
 padding:14px;
 background:#ecfdf5;
 border:2px solid #86efac;
 color:#166534;
 font-size:16px;
 font-weight:900;
 white-space:pre-wrap;
}

.status.show{
 display:block;
}

.status.error{
 background:#fff1f2;
 border-color:#fda4af;
 color:#9f1239;
}

.adminApp{
 display:none;
}

.adminApp.show{
 display:block;
}

.topMenu{
 margin-top:18px;
 display:grid;
 grid-template-columns:1fr 1fr 120px;
 gap:10px;
}

.tabBtn{
 min-height:62px;
 border-radius:22px;
 border:2px solid var(--line);
 background:#fff;
 color:var(--kappa-dark);
 font-size:18px;
 font-weight:900;
}

.tabBtn.active{
 background:linear-gradient(135deg,#14532d 0%,#237a3b 55%,#4caf63 100%);
 color:#fff;
 border-color:var(--kappa-main);
}

.panel{
 display:none;
 margin-top:18px;
}

.panel.active{
 display:block;
}

.formGrid{
 display:grid;
 gap:14px;
 margin-top:14px;
}

.row2{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
}

.actionGrid{
 display:grid;
 grid-template-columns:1fr 1fr 1fr;
 gap:10px;
 margin-top:18px;
}

.previewBox{
 margin-top:16px;
 border-radius:20px;
 background:#fffdf0;
 border:2px dashed #eadf9d;
 padding:16px;
 color:#3b3415;
 font-size:16px;
 font-weight:850;
 white-space:pre-wrap;
}

.reportTools{
 margin-top:14px;
 display:grid;
 grid-template-columns:1fr 1fr 1fr;
 gap:10px;
}

.reportList{
 margin-top:16px;
 display:grid;
 gap:16px;
}

.reportCard{
 padding:0;
 overflow:hidden;
}

.reportHead{
 padding:18px;
 background:
 radial-gradient(circle at 100% 0%,rgba(224,242,254,.65),transparent 34%),
 linear-gradient(135deg,#ffffff 0%,#f3fff1 100%);
 border-bottom:1px solid #d6f3d8;
}

.reportHead h3{
 margin:0;
 color:var(--kappa-dark);
 font-size:28px;
 line-height:1.25;
 font-weight:900;
}

.reportId{
 margin-top:4px;
 color:var(--muted);
 font-size:13px;
 font-weight:900;
}

.badges{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 margin-top:10px;
}

.badge{
 display:inline-flex;
 padding:6px 10px;
 border-radius:999px;
 background:var(--shinryoku);
 border:1px solid var(--line);
 color:var(--kappa-dark);
 font-size:13px;
 font-weight:900;
}

.badge.yellow{
 background:var(--cream);
 border-color:var(--gold);
 color:#5c3b00;
}

.reportBody{
 padding:18px;
}

.infoGrid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.infoBox{
 border-radius:18px;
 background:#f8fff6;
 border:1px solid #c7eecb;
 padding:12px;
}

.infoBox.full{
 grid-column:1 / -1;
}

.infoLabel{
 color:var(--kappa-dark);
 font-size:13px;
 font-weight:900;
}

.infoText{
 margin-top:4px;
 color:var(--ink);
 font-size:16px;
 line-height:1.6;
 font-weight:850;
 white-space:pre-wrap;
 word-break:break-word;
}

.reportPhoto{
 margin-top:12px;
 width:100%;
 max-height:320px;
 object-fit:contain;
 border-radius:18px;
 background:#fff;
 border:1px solid #c7eecb;
}

.mapButtons{
 margin-top:12px;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.mapButtons a,
.mapButtons button{
 min-height:52px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:18px;
 border:2px solid var(--line);
 background:#fff;
 color:var(--kappa-dark);
 font-size:16px;
 font-weight:900;
}

.editBox{
 margin-top:14px;
 border-radius:22px;
 background:#fffdf0;
 border:2px solid #eadf9d;
 padding:14px;
}

.reportSave{
 width:100%;
 margin-top:14px;
 min-height:62px;
}

.footer{
 margin-top:28px;
 text-align:center;
 color:var(--ink);
 font-size:13px;
 font-weight:800;
}

@media(max-width:700px){

 .wrap{
  width:94%;
 }

 .hero,
 .loginCard,
 .panel{
  border-radius:24px;
  padding:18px;
 }

 .topMenu,
 .row2,
 .actionGrid,
 .reportTools,
 .infoGrid,
 .mapButtons{
  grid-template-columns:1fr;
 }

 .topMenu{
  position:static;
  background:transparent;
  padding:0;
 }

 input,
 select,
 textarea{
  font-size:17px;
 }

 .reportHead h3{
  font-size:25px;
 }

}

</style>
</head>

<body>

<div class="wrap">

<header class="header">

 <a class="brand" href="index.html">
  <img src="apple-touch-icon.png" alt="岩下りゅう">
  <span>岩下りゅう 管理画面</span>
 </a>

 <a class="homeLink" href="index.html">公開ページへ</a>

</header>

<section class="hero">

 <div class="kicker">管理者用</div>

 <h1>活動報告DX 管理画面</h1>

 <p>
  合言葉を入れると、活動報告の登録と、困りごと投稿の管理ができます。
 </p>

</section>

<section class="loginCard" id="loginCard">

 <h2>合言葉を入力</h2>

 <p>
  管理者だけが入れる画面です。
 </p>

 <label for="loginPassword">
  合言葉
  <span class="help">教えた人だけが使います</span>
 </label>

 <input id="loginPassword" type="password" inputmode="numeric" placeholder="合言葉を入力">

 <button class="btn btnGreen loginButton" type="button" onclick="login()">
  管理画面に入る
 </button>

 <div id="loginStatus" class="status"></div>

</section>

<div class="adminApp" id="adminApp">

 <div class="topMenu">

  <button class="tabBtn active" type="button" data-panel="activityPanel">
   活動報告を登録
  </button>

  <button class="tabBtn" type="button" data-panel="reportsPanel">
   困りごとを管理
  </button>

  <button class="btn btnDanger" type="button" onclick="logout()">
   ログアウト
  </button>

 </div>

 <section class="panel active" id="activityPanel">

  <h2>活動報告を登録</h2>

  <p>
   入力して保存すると、公開状態が「公開」のものだけ活動ページに表示されます。
  </p>

  <div class="formGrid">

   <div class="row2">

    <div>
     <label for="date">日付</label>
     <input id="date" type="date">
    </div>

    <div>
     <label for="theme">テーマ</label>
     <select id="theme">
      <option value="">選んでください</option>
      <option value="地域活動">地域活動</option>
      <option value="田子山富士">田子山富士</option>
      <option value="商店会">商店会</option>
      <option value="カッパのまち">カッパのまち</option>
      <option value="イベント">イベント</option>
      <option value="防災">防災</option>
      <option value="福祉">福祉</option>
      <option value="子育て">子育て</option>
      <option value="まちづくり">まちづくり</option>
      <option value="その他">その他</option>
     </select>
    </div>

   </div>

   <div>
    <label for="title">タイトル</label>
    <input id="title" type="text" placeholder="例：地域の見守り活動に参加しました">
   </div>

   <div>
    <label for="summary">概要</label>
    <textarea id="summary" placeholder="活動内容、感じたこと、地域の皆さんへ伝えたいことを書きます。"></textarea>
   </div>

   <div>
    <label for="imageUrl1">画像URL1</label>
    <input id="imageUrl1" type="text" placeholder="images/activity/activity-001-1.jpg">
   </div>

   <div>
    <label for="imageUrl2">画像URL2</label>
    <input id="imageUrl2" type="text" placeholder="images/activity/activity-001-2.jpg">
   </div>

   <div>
    <label for="imageUrl3">画像URL3</label>
    <input id="imageUrl3" type="text" placeholder="images/activity/activity-001-3.jpg">
   </div>

   <div>
    <label for="imageUrl4">画像URL4</label>
    <input id="imageUrl4" type="text" placeholder="images/activity/activity-001-4.jpg">
   </div>

   <div>
    <label for="imageUrl5">画像URL5</label>
    <input id="imageUrl5" type="text" placeholder="images/activity/activity-001-5.jpg">
   </div>

   <div>
    <label for="snsText">SNS投稿文</label>
    <textarea id="snsText" placeholder="空欄の場合は、下のボタンで作れます。"></textarea>
   </div>

   <div class="row2">

    <div>
     <label for="publicStatus">公開状態</label>
     <select id="publicStatus">
      <option value="下書き">下書き</option>
      <option value="確認中">確認中</option>
      <option value="公開">公開</option>
      <option value="非公開">非公開</option>
     </select>
    </div>

    <div>
     <label for="order">表示順</label>
     <input id="order" type="number" placeholder="空欄で通常表示">
    </div>

   </div>

   <div>
    <label for="note">備考</label>
    <textarea id="note" placeholder="管理用メモ。公開ページには表示しません。"></textarea>
   </div>

  </div>

  <div class="actionGrid">

   <button class="btn btnYellow" type="button" onclick="makeSnsText()">
    SNS文を作る
   </button>

   <button class="btn btnGreen" type="button" onclick="saveActivity()">
    活動を保存する
   </button>

   <button class="btn" type="button" onclick="clearActivityForm()">
    クリア
   </button>

  </div>

  <div id="activityStatus" class="status"></div>

  <div id="preview" class="previewBox">
   SNS投稿文プレビュー
  </div>

 </section>

 <section class="panel" id="reportsPanel">

  <h2>困りごと投稿を管理</h2>

  <p>
   投稿内容を確認し、対応状態・公開状態・改善報告を更新します。
  </p>

  <div class="reportTools">

   <button class="btn btnGreen" type="button" onclick="loadReports()">
    最新の投稿を読み込む
   </button>

   <select id="filterStatus" onchange="renderReports()">
    <option value="">すべての対応状態</option>
    <option value="受付">受付</option>
    <option value="確認中">確認中</option>
    <option value="対応中">対応中</option>
    <option value="対応済">対応済</option>
    <option value="改善済">改善済</option>
    <option value="保留">保留</option>
   </select>

   <select id="filterPublic" onchange="renderReports()">
    <option value="">すべての公開状態</option>
    <option value="公開">公開</option>
    <option value="非公開">非公開</option>
   </select>

  </div>

  <div id="reportsStatus" class="status"></div>

  <div id="reportList" class="reportList"></div>

 </section>

</div>

<footer class="footer">
 岩下りゅう 活動報告DX 管理画面
</footer>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbwToprHC5nP50ATEhNi5DyXM-zFjPN0hVw0B3Y8trAiuMdb7zM4KSbkU3ZSTlgDly1lJw/exec";

let adminPassword =
sessionStorage.getItem("iwashita_admin_password") || "";

let allReports =
[];

const loginCard =
document.getElementById("loginCard");

const adminApp =
document.getElementById("adminApp");

function val(id){

 const el =
 document.getElementById(id);

 return el ? String(el.value || "").trim() : "";

}

function setVal(id,value){

 const el =
 document.getElementById(id);

 if(el){

  el.value = value || "";

 }

}

function esc(v){

 return String(v || "")
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;")
 .replace(/'/g,"&#39;");

}

function pick(obj,keys,defaultValue){

 obj =
 obj || {};

 for(let i = 0; i < keys.length; i++){

  const key =
  keys[i];

  if(
   obj[key] !== undefined &&
   obj[key] !== null &&
   String(obj[key]).trim() !== ""
  ){

   return String(obj[key]).trim();

  }

 }

 return defaultValue || "";

}

function showStatus(id,message,isError){

 const el =
 document.getElementById(id);

 if(!el){

  return;

 }

 el.textContent =
 message;

 el.classList.add("show");

 if(isError){

  el.classList.add("error");

 }else{

  el.classList.remove("error");

 }

}

function hideStatus(id){

 const el =
 document.getElementById(id);

 if(!el){

  return;

 }

 el.classList.remove("show");
 el.classList.remove("error");
 el.textContent = "";

}

function jsonp(paramsObj){

 return new Promise(function(resolve,reject){

  const callbackName =
  "cb_" +
  Date.now() +
  "_" +
  Math.random().toString(36).slice(2,8);

  const params =
  new URLSearchParams();

  Object.keys(paramsObj).forEach(function(key){

   params.set(key,paramsObj[key]);

  });

  params.set("callback",callbackName);
  params.set("v",String(Date.now()));

  const script =
  document.createElement("script");

  window[callbackName] =
  function(data){

   resolve(data);

   cleanup();

  };

  function cleanup(){

   try{

    delete window[callbackName];

   }catch(e){

    window[callbackName] = undefined;

   }

   if(script.parentNode){

    script.parentNode.removeChild(script);

   }

  }

  script.onerror =
  function(){

   cleanup();

   reject(new Error("通信に失敗しました"));

  };

  script.src =
  GAS_URL + "?" + params.toString();

  document.body.appendChild(script);

 });

}

async function login(){

 const password =
 val("loginPassword");

 if(!password){

  showStatus("loginStatus","合言葉を入力してください。",true);

  return;

 }

 showStatus("loginStatus","確認しています。",false);

 try{

  const data =
  await jsonp({
   mode:"checkAdmin",
   adminPassword:password
  });

  if(data && data.ok){

   adminPassword =
   password;

   sessionStorage.setItem(
    "iwashita_admin_password",
    adminPassword
   );

   showAdminApp();

   return;

  }

  showStatus("loginStatus","合言葉が違います。",true);

 }catch(e){

  showStatus("loginStatus","確認できませんでした。GAS URLを確認してください。",true);

 }

}

async function checkStoredLogin(){

 if(!adminPassword){

  return;

 }

 try{

  const data =
  await jsonp({
   mode:"checkAdmin",
   adminPassword:adminPassword
  });

  if(data && data.ok){

   showAdminApp();

  }else{

   logout();

  }

 }catch(e){

  logout();

 }

}

function showAdminApp(){

 loginCard.style.display =
 "none";

 adminApp.classList.add("show");

 hideStatus("loginStatus");

 setVal("loginPassword","");

}

function logout(){

 adminPassword = "";

 sessionStorage.removeItem("iwashita_admin_password");

 adminApp.classList.remove("show");

 loginCard.style.display =
 "block";

}

document.querySelectorAll(".tabBtn").forEach(function(btn){

 btn.addEventListener("click",function(){

  const panelId =
  btn.getAttribute("data-panel");

  document.querySelectorAll(".tabBtn").forEach(function(b){
   b.classList.remove("active");
  });

  document.querySelectorAll(".panel").forEach(function(p){
   p.classList.remove("active");
  });

  btn.classList.add("active");

  document.getElementById(panelId).classList.add("active");

  if(panelId === "reportsPanel" && allReports.length === 0){

   loadReports();

  }

 });

});

function todayForInput(){

 const d =
 new Date();

 const y =
 d.getFullYear();

 const m =
 String(d.getMonth() + 1).padStart(2,"0");

 const day =
 String(d.getDate()).padStart(2,"0");

 return y + "-" + m + "-" + day;

}

function dateForText(inputDate){

 if(!inputDate){

  return "";

 }

 return inputDate.replace(/-/g,"/");

}

function makeSnsText(){

 const date =
 dateForText(val("date"));

 const theme =
 val("theme");

 const title =
 val("title");

 const summary =
 val("summary");

 if(!title){

  alert("タイトルを入れてください。");

  return "";

 }

 const lines = [];

 lines.push("岩下りゅう 活動報告");
 lines.push("");

 if(date){
  lines.push(date);
 }

 if(theme){
  lines.push("テーマ：" + theme);
 }

 lines.push("");
 lines.push(title);
 lines.push("");

 if(summary){
  lines.push(summary);
  lines.push("");
 }

 lines.push("#岩下りゅう");
 lines.push("#志木市");
 lines.push("#地域活動");

 if(theme){
  lines.push("#" + theme.replace(/\s+/g,""));
 }

 lines.push("");
 lines.push("https://ichirohns-jpg.github.io/iwashita-ryu-activity/activity.html");

 const text =
 lines.join("\n");

 setVal("snsText",text);

 document.getElementById("preview").textContent =
 text;

 return text;

}

async function saveActivity(){

 if(!adminPassword){

  alert("先に合言葉を入力してください。");

  return;

 }

 const title =
 val("title");

 const summary =
 val("summary");

 if(!title){

  alert("タイトルを入れてください。");

  return;

 }

 if(!summary){

  alert("概要を入れてください。");

  return;

 }

 let snsText =
 val("snsText");

 if(!snsText){

  snsText =
  makeSnsText();

 }

 showStatus("activityStatus","保存しています。",false);

 try{

  const data =
  await jsonp({
   mode:"saveActivity",
   adminPassword:adminPassword,
   date:dateForText(val("date")),
   theme:val("theme"),
   title:title,
   summary:summary,
   imageUrl1:val("imageUrl1"),
   imageUrl2:val("imageUrl2"),
   imageUrl3:val("imageUrl3"),

   imageUrl5:val("imageUrl5"),
   snsText:snsText,

   order:val("order"),
   note:val("note")

  if(data && data.ok){

  showStatus("activityStatus","通信に失敗しました。",true);

 }

}

async function loadReports(){

 if(!adminPassword){

  alert("先に合言葉を入力してください。");

  return;

 }

 showStatus("reportsStatus","投稿を読み込んでいます。",false);

 document.getElementById("reportList").innerHTML = "";

 try{

  const data =
  await jsonp({
   mode:"getAdminReports",
   adminPassword:adminPassword
  });

  if(data && data.ok){

   allReports =
   normalizeRecords(data);

   showStatus(
    "reportsStatus",
    allReports.length + "件の投稿を読み込みました。",
    false
   );

   renderReports();

   return;

  }

  showStatus(
   "reportsStatus",
   "読み込めませんでした。" + (data && data.error ? "\n" + data.error : ""),
   true
  );

 }catch(e){

  showStatus("reportsStatus","通信に失敗しました。",true);

 }

}

function normalizeRecords(data){

 if(Array.isArray(data)){
  return data;
 }

 if(data && Array.isArray(data.records)){
  return data.records;
 }

 if(data && Array.isArray(data.reports)){
  return data.reports;
 }

 if(data && Array.isArray(data.data)){
  return data.data;
 }

 return [];

}

function renderReports(){

 const statusFilter =
 val("filterStatus");

 const publicFilter =
 val("filterPublic");

 let records =
 allReports.slice();

 if(statusFilter){

  records =
  records.filter(function(r){

   return pick(r,["対応状態","status"],"") === statusFilter;

  });

 }

 if(publicFilter){

  records =
  records.filter(function(r){

   return pick(r,["公開状態","publicStatus"],"") === publicFilter;

  });

 }

 const list =
 document.getElementById("reportList");

 if(records.length === 0){

  list.innerHTML =
  '<div class="reportCard"><div class="reportBody"><strong>表示する投稿はありません。</strong></div></div>';

  return;

 }

 list.innerHTML =
 records
 .map(function(r,index){

  return reportHtml(r,index);

 })
 .join("");

}

function optionHtml(current,options){

 return options.map(function(o){

  return '<option value="' + esc(o) + '"' +
  (String(current) === String(o) ? " selected" : "") +
  '>' + esc(o) + '</option>';

 }).join("");

}

function reportHtml(r,index){

 const id =
 pick(r,["ID","id"],"");

 const date =
 pick(r,["日時","date"],"");

 const name =
 pick(r,["お名前・ニックネーム","name"],"匿名");

 const town =
 pick(r,["町名","town","area"],"その他");

 const category =
 pick(r,["カテゴリ","category"],"その他");

 const place =
 pick(r,["場所の説明","place","location"],"");

 const content =
 pick(r,["内容","content","body","message"],"");

 const urgency =
 pick(r,["緊急度","urgency"],"通常");

 const status =
 pick(r,["対応状態","status"],"受付");

 const publicStatus =
 pick(r,["公開状態","publicStatus"],"公開");

 const order =
 pick(r,["表示順","order"],"");

 const photoUrl =
 pick(r,["写真URL","photoUrl","imageUrl"],"");

 const mapUrl =
 pick(r,["GoogleマップURL","mapUrl"],"");

 const naviUrl =
 pick(r,["ナビURL","naviUrl","navUrl"],"");

 const improvement =
 pick(r,["改善報告","improvement"],"");

 const improvementPhotoUrl =
 pick(r,["改善写真URL","improvementPhotoUrl"],"");

 const note =
 pick(r,["備考","note"],"");

 return ''
 + '<article class="reportCard">'
 + '<div class="reportHead">'
 + '<h3>' + esc(category) + '</h3>'
 + '<div class="reportId">ID：' + esc(id) + '</div>'
 + '<div class="badges">'
 + '<span class="badge yellow">' + esc(status) + '</span>'
 + '<span class="badge">' + esc(publicStatus) + '</span>'
 + '<span class="badge">' + esc(town) + '</span>'
 + '<span class="badge">' + esc(urgency) + '</span>'
 + (date ? '<span class="badge">' + esc(date) + '</span>' : '')
 + '</div>'
 + '</div>'

 + '<div class="reportBody">'

 + '<div class="infoGrid">'
 + '<div class="infoBox"><div class="infoLabel">名前</div><div class="infoText">' + esc(name) + '</div></div>'
 + '<div class="infoBox"><div class="infoLabel">町名</div><div class="infoText">' + esc(town) + '</div></div>'
 + '<div class="infoBox full"><div class="infoLabel">場所</div><div class="infoText">' + esc(place || "未入力") + '</div></div>'
 + '<div class="infoBox full"><div class="infoLabel">内容</div><div class="infoText">' + esc(content || "未入力") + '</div></div>'
 + '</div>'

 + (photoUrl ? '<img class="reportPhoto" src="' + esc(photoUrl) + '" alt="投稿写真">' : '')

 + '<div class="mapButtons">'
 + (mapUrl ? '<a href="' + esc(mapUrl) + '" target="_blank" rel="noopener">地図を見る</a>' : '<button type="button" disabled>地図なし</button>')
 + (naviUrl ? '<a href="' + esc(naviUrl) + '" target="_blank" rel="noopener">ナビを開く</a>' : '<button type="button" disabled>ナビなし</button>')
 + '</div>'

 + '<div class="editBox">'

 + '<div class="row2">'
 + '<div><label>対応状態</label><select id="status-' + index + '">' +
 optionHtml(status,["受付","確認中","対応中","対応済","改善済","保留"]) +
 '</select></div>'

 + '<div><label>公開状態</label><select id="public-' + index + '">' +
 optionHtml(publicStatus,["公開","非公開"]) +
 '</select></div>'
 + '</div>'

 + '<label>表示順</label>'
 + '<input id="order-' + index + '" type="number" value="' + esc(order) + '" placeholder="空欄で通常表示">'

 + '<label>改善報告</label>'
 + '<textarea id="improvement-' + index + '" placeholder="例：確認しました。対応済みです。">' + esc(improvement) + '</textarea>'

 + '<label>改善写真URL</label>'
 + '<input id="improvementPhoto-' + index + '" type="text" value="' + esc(improvementPhotoUrl) + '" placeholder="改善後の写真URL">'

 + '<label>備考</label>'
 + '<textarea id="note-' + index + '" placeholder="管理用メモ">' + esc(note) + '</textarea>'

 + '<button class="btn btnGreen reportSave" type="button" onclick="updateOneReport(' + JSON.stringify(id) + ',' + index + ')">この投稿を更新する</button>'

 + '</div>'

 + '</div>'
 + '</article>';

}

async function updateOneReport(id,index){

 if(!adminPassword){

  alert("先に合言葉を入力してください。");

  return;

 }

 showStatus("reportsStatus","更新しています。",false);

 try{

  const data =
  await jsonp({
   mode:"updateReport",
   adminPassword:adminPassword,
   id:id,
   status:val("status-" + index),
   publicStatus:val("public-" + index),
   order:val("order-" + index),
   improvement:val("improvement-" + index),
   improvementPhotoUrl:val("improvementPhoto-" + index),
   note:val("note-" + index)
  });

  if(data && data.ok){

   showStatus("reportsStatus","更新しました。",false);

   await loadReports();

   return;

  }

  showStatus(
   "reportsStatus",
   "更新できませんでした。" + (data && data.error ? "\n" + data.error : ""),
   true
  );

 }catch(e){

  showStatus("reportsStatus","通信に失敗しました。",true);

 }

}

setVal("date",todayForInput());

checkStoredLogin();

</script>
